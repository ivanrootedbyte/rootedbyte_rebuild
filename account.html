<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="Your RootedByte account for saved reflections, shared outputs, and private journal entries."
  />

  <title>My Account | RootedByte</title>

  <style>
    :root {
      --bg: #eef3ea;
      --bg-soft: #fbf8ef;
      --card: rgba(255, 252, 244, 0.9);
      --card-strong: rgba(255, 255, 255, 0.96);
      --text: #17231b;
      --muted: #647363;
      --line: rgba(23, 35, 27, 0.12);
      --forest: #254d35;
      --forest-dark: #142a1e;
      --cream: #fbf8ef;
      --danger: #a64032;
      --shadow: 0 24px 70px rgba(34, 48, 37, 0.13);
      --radius: 30px;
      --max: 1100px;
    }

    * {
      box-sizing: border-box;
    }

    
    body {
  margin: 0;
  min-height: 100vh;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(37, 77, 53, 0.18), transparent 30rem),
    radial-gradient(circle at 88% 8%, rgba(201, 154, 82, 0.18), transparent 30rem),
    radial-gradient(circle at 50% 100%, rgba(111, 127, 79, 0.15), transparent 34rem),
    linear-gradient(180deg, #fbf8ef 0%, #eef3ea 50%, #dfe8d9 100%);
  line-height: 1.6;
}
    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    textarea {
      font: inherit;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(18px);
      background: rgba(251, 248, 239, 0.84);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      width: min(var(--max), 100%);
      margin: 0 auto;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-weight: 900;
      letter-spacing: -0.04em;
      font-size: 1.15rem;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      padding: 3px;
      border: 2px solid transparent;
      border-radius: 17px;
      background:
        linear-gradient(var(--cream), var(--cream)) padding-box,
        linear-gradient(135deg, #ff6b6b, #f7b267, #ffe66d, #4ecdc4, #5b8def, #b388ff) border-box;
      overflow: hidden;
      flex: 0 0 auto;
      box-shadow: 0 10px 24px rgba(34, 48, 37, 0.14);
    }

    .brand-mark img {
      width: 118%;
      height: 118%;
      object-fit: cover;
      object-position: center;
      display: block;
      border-radius: 14px;
    }

    .nav-scroll-wrap {
  display: flex;
  justify-content: flex-end;
  min-width: 0;
}

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-links a,
    .nav-links button {
      color: var(--muted);
      padding: 9px 13px;
      border-radius: 999px;
      border: 0;
      background: transparent;
      transition: background 180ms ease, color 180ms ease;
      font-size: 0.95rem;
      font-weight: 850;
      cursor: pointer;
    }

    .nav-links a:hover,
    .nav-links a.active,
    .nav-links button:hover {
      color: var(--text);
      background: rgba(37, 77, 53, 0.1);
    }
    
    .page {
      width: min(var(--max), calc(100% - 2rem));
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 4rem) 0;
    }

    .hero-card,
    .panel,
    .saved-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .hero-card {
      padding: clamp(1.5rem, 4vw, 3rem);
      margin-bottom: 1rem;
      background:
        linear-gradient(135deg, rgba(255, 252, 244, 0.94), rgba(255, 255, 255, 0.86)),
        radial-gradient(circle at top right, rgba(37, 77, 53, 0.1), transparent 18rem);
    }

    .pill {
      display: inline-flex;
      margin-bottom: 1rem;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      color: var(--forest-dark);
      background: rgba(37, 77, 53, 0.1);
      border: 1px solid rgba(37, 77, 53, 0.16);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      color: var(--text);
      line-height: 1.05;
      letter-spacing: -0.055em;
    }

    h1 {
      font-size: clamp(2.6rem, 7vw, 5.3rem);
      font-weight: 950;
    }

    h2 {
      font-size: clamp(1.55rem, 4vw, 2.7rem);
      font-weight: 950;
    }

    h3 {
      font-size: 1.35rem;
      font-weight: 920;
    }

    .lead,
    .muted,
    .status {
      color: var(--muted);
    }

    .lead {
      max-width: 760px;
      margin: 1rem 0 0;
      font-size: clamp(1.04rem, 2vw, 1.22rem);
    }

    .account-heading {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.account-heading-logo-wrap {
  width: 82px;
  height: 82px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  padding: 3px;
  background:
    linear-gradient(#fbf8ef, #fbf8ef) padding-box,
    linear-gradient(
      135deg,
      #ff6b6b,
      #f7b267,
      #ffe66d,
      #4ecdc4,
      #5b8def,
      #b388ff
    ) border-box;
  border: 2px solid transparent;
  box-shadow:
    0 18px 38px rgba(34, 48, 37, 0.14),
    0 0 34px rgba(91, 141, 239, 0.12);
  overflow: hidden;
  flex: 0 0 auto;
}

.account-heading-logo {
  width: 118%;
  height: 118%;
  object-fit: cover;
  object-position: center;
  border-radius: 50%;
  display: block;
}

.account-heading h1 {
  margin: 0;
}

.account-heading p {
  margin: 0.45rem 0 0;
  color: var(--muted);
}

.tag {
  display: inline-flex;
  color: var(--forest);
  font-weight: 900;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.45rem;
}
    
    .account-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 1rem;
      align-items: start;
    }

    .panel {
      padding: 1.25rem;
    }

    .account-tabs {
      display: grid;
      gap: 0.65rem;
    }

    .tab-button,
    .btn {
      min-height: 46px;
      border-radius: 999px;
      padding: 0 1rem;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255, 255, 255, 0.72);
      font-weight: 900;
      cursor: pointer;
    }

    .tab-button.active,
    .btn.primary {
      color: var(--cream);
      background: linear-gradient(135deg, var(--forest-dark), var(--forest));
      border: 0;
    }

    .saved-list {
      display: grid;
      gap: 1rem;
      margin-top: 1rem;
    }

    .saved-card {
      padding: 1.15rem;
      background: var(--card-strong);
    }

    .saved-card__meta {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 750;
    }

    .saved-card__actions {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .saved-output-layout {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--line);
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.75fr);
  gap: 1rem;
  align-items: start;
}

.saved-output-layout[hidden] {
  display: none;
}

.saved-output-body,
.saved-journal-panel {
  min-width: 0;
}

.saved-output-body[hidden],
.saved-journal-panel[hidden] {
  display: none;
}

.saved-journal-panel {
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 1rem;
  background:
    linear-gradient(135deg, rgba(255, 252, 244, 0.96), rgba(255, 255, 255, 0.82));
}

.saved-journal-panel h4 {
  margin: 0;
  color: var(--forest-dark);
  font-size: 1rem;
  letter-spacing: -0.02em;
}

.saved-journal-panel p {
  margin: 0.45rem 0 0;
  color: var(--muted);
}

.saved-output-body[hidden] {
  display: none;
}

.saved-output-block {
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 1rem;
  margin-top: 0.85rem;
  background: rgba(255, 255, 255, 0.7);
}

.saved-output-block p {
  margin: 0.5rem 0 0;
  color: var(--muted);
}

.saved-output-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0.85rem;
  margin-top: 0.85rem;
}

.saved-output-quote {
  border-left: 4px solid var(--forest);
  padding-left: 1rem;
  color: var(--text);
  font-size: 1.05rem;
}
    
    textarea {
      width: 100%;
      min-height: 120px;
      margin-top: 0.9rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 18px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
      resize: vertical;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(37, 77, 53, 0.38);
      box-shadow: 0 0 0 4px rgba(37, 77, 53, 0.1);
    }

    .empty-state {
      padding: 1.25rem;
      border: 1px dashed var(--line);
      border-radius: 24px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.45);
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 820px) {
  .site-header {
    padding: 0.7rem 0.85rem;
  }

  .nav {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    gap: 0.7rem;
    width: 100%;
    padding: 0;
    overflow: hidden;
  }

  .brand {
    flex: 0 0 auto;
    white-space: nowrap;
  }

  .brand-mark {
    width: 34px;
    height: 34px;
    border-radius: 12px;
  }

  .brand span:last-child {
    font-size: 0.95rem;
  }

  .nav-scroll-wrap {
    position: relative;
    flex: 1 1 auto;
    min-width: 0;
    max-width: 100%;
    overflow: hidden;
  }

  .nav-scroll-wrap::after {
    content: "›";
    position: absolute;
    right: 0.25rem;
    top: 50%;
    transform: translateY(-50%);
    width: 1.6rem;
    height: 1.6rem;
    display: grid;
    place-items: center;
    border-radius: 999px;
    color: var(--text);
    background: rgba(255, 255, 255, 0.7);
    pointer-events: none;
    font-size: 1.2rem;
    font-weight: 900;
  }

  .nav-links {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    justify-content: flex-start;
    gap: 0.35rem;
    max-width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    padding: 0.28rem 2rem 0.28rem 0.28rem;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.48);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .nav-links::-webkit-scrollbar {
    display: none;
  }

  .nav-links a,
.nav-links button {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  white-space: nowrap;
  min-height: 36px;
  padding: 0 0.68rem;
  border-radius: 999px;
  font-size: 0.8rem;
  line-height: 1;
}

  .nav-links button {
  appearance: none;
  -webkit-appearance: none;
  margin: 0;
  font-family: inherit;
}
      
  .account-grid {
    grid-template-columns: 1fr;
  }
      .account-heading {
  gap: 0.85rem;
}

.account-heading-logo-wrap {
  width: 62px;
  height: 62px;
}

.saved-output-grid {
  grid-template-columns: 1fr;
}

.saved-output-layout {
  grid-template-columns: 1fr;
}
      
}

    @media (min-width: 980px) {
  .page {
    width: min(1180px, calc(100% - 48px));
    padding: 3rem 0 4rem;
  }

  .hero-card {
    padding: 2.4rem 2.4rem 2.1rem;
    margin-bottom: 1.2rem;
  }

  .account-heading h1 {
    font-size: clamp(3rem, 6vw, 4.8rem);
    line-height: 0.96;
  }

  .account-heading p {
    font-size: 1.02rem;
    max-width: 680px;
  }

  .account-grid {
    grid-template-columns: 280px minmax(0, 1fr);
    gap: 1.2rem;
  }

  .panel {
    padding: 1.4rem;
  }

  .saved-list {
    gap: 1.1rem;
  }

  .saved-card {
    padding: 1.3rem;
  }

  .saved-output-layout {
    grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.75fr);
    gap: 1.1rem;
  }

  .saved-output-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
  </style>
</head>

<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="index.html" aria-label="RootedByte home">
        <span class="brand-mark">
          <img src="images/rootedbyte-icon.png" alt="" />
        </span>
        <span>RootedByte</span>
      </a>

   <div class="nav-scroll-wrap">
      <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="tone.html">SoundSense</a>
      <a href="newsverse.html">Signal</a>
      <a href="rootedos.html">Inner Work</a>
      <a href="account.html" class="active">My Account</a>
      <button type="button" id="signOutButton">Sign Out</button>
    </div>
</div>
    </nav>
  </header>

  <main class="page">
    <section class="hero-card">
      <span class="pill">Private Account</span>
      <div class="account-heading">
  <span class="account-heading-logo-wrap">
    <img src="images/rootedbyte-icon.png" alt="" class="account-heading-logo" />
  </span>

  <div>
    <span class="tag">Private space</span>
    <h1>My Account</h1>
    <p>Your saved RootedByte outputs and reflections live here.</p>
  </div>
</div>
      <p class="lead" id="accountLead">
        Loading your saved outputs and journal space...
      </p>
    </section>

    <section class="account-grid">
      <aside class="panel">
        <div class="account-tabs">
          <button class="tab-button active" type="button" data-tab="saved">Saved Outputs</button>
          <button class="tab-button" type="button" data-tab="shared">Shared Links</button>
          <button class="tab-button" type="button" data-tab="journal">Journal</button>
        </div>
      </aside>

      <section class="panel">
        <div id="accountStatus" class="status" role="status" aria-live="polite"></div>
        <div id="accountContent"></div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

 <script>
  const $ = (selector) => document.querySelector(selector);
  const $$ = (selector) => Array.from(document.querySelectorAll(selector));

  const accountLead = $('#accountLead');
  const accountStatus = $('#accountStatus');
  const accountContent = $('#accountContent');
  const signOutButton = $('#signOutButton');

  const SIGNED_IN_FLAG = 'rootedbyte_user_signed_in';

  let supabaseClient = null;
  let currentUser = null;
  let currentTab = 'saved';

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function formatDate(value) {
    if (!value) return '';

    try {
      return new Intl.DateTimeFormat(undefined, {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      }).format(new Date(value));
    } catch {
      return '';
    }
  }

  function setStatus(message, type = 'info') {
    if (!accountStatus) return;
    accountStatus.className = type === 'error' ? 'status error' : 'status';
    accountStatus.textContent = message || '';
  }

  function setLocalSignedInFlag(isSignedIn) {
    try {
      if (isSignedIn) {
        localStorage.setItem(SIGNED_IN_FLAG, 'true');
      } else {
        localStorage.removeItem(SIGNED_IN_FLAG);
      }
    } catch {
      // Ignore localStorage issues.
    }
  }

  function normalizeAppType(appType) {
    const value = String(appType || '').trim().toLowerCase();

    const map = {
      rootedos: 'inner_work',
      'inner work': 'inner_work',
      inner_work: 'inner_work',

      newsverse: 'signal',
      signal: 'signal',

      tone: 'soundsense',
      soundsense: 'soundsense',
      'sound sense': 'soundsense'
    };

    return map[value] || value || 'rootedbyte';
  }

  function getAppLabel(appType) {
    const normalized = normalizeAppType(appType);

    if (normalized === 'inner_work') return 'Inner Work';
    if (normalized === 'signal') return 'Signal';
    if (normalized === 'soundsense') return 'SoundSense';

    return 'RootedByte';
  }

  function renderSavedOutputBody(outputJson) {
    const data = outputJson || {};

    const areas = Array.isArray(data.areas) ? data.areas : [];
    const plan = data.daily_plan || {};
    const rootedVerses = Array.isArray(data.reflection_verses)
      ? data.reflection_verses.slice(0, 3)
      : [];

    const newsVerses = Array.isArray(data.verses) ? data.verses : [];
    const prayerPoints = Array.isArray(data.prayer_points) ? data.prayer_points : [];

    const isSoundSense =
      data.song ||
      data.artist ||
      data.song_meaning ||
      data.faith_lens ||
      data.instrument_guidance ||
      data.rehearsal_prep ||
      data.spiritual_reflection;

    const isSignal =
      data.article_summary ||
      data.overall_theme ||
      data.exegesis ||
      data.jesus_lens ||
      newsVerses.length;

    const innerWorkHtml = `
      ${
        data.summary
          ? `<div class="saved-output-block">
              <span class="tag">Summary</span>
              <p>${escapeHtml(data.summary)}</p>
            </div>`
          : ''
      }

      ${
        areas.length
          ? areas.map((area) => `
            <div class="saved-output-block">
              <span class="tag">${escapeHtml(area.area || 'Reflection area')}</span>
              ${area.urgency ? `<p><strong>Urgency:</strong> ${escapeHtml(area.urgency)}</p>` : ''}
              ${area.current_state ? `<p><strong>Current state:</strong> ${escapeHtml(area.current_state)}</p>` : ''}
              ${area.recommendation ? `<p><strong>Recommendation:</strong> ${escapeHtml(area.recommendation)}</p>` : ''}
              ${area.scripture ? `<p><strong>Truth anchor:</strong> ${escapeHtml(area.scripture)}</p>` : ''}
              ${area.action_step ? `<p><strong>Action step:</strong> ${escapeHtml(area.action_step)}</p>` : ''}
            </div>
          `).join('')
          : ''
      }

      ${
        Object.keys(plan).length
          ? `<div class="saved-output-block">
              <span class="tag">Daily rhythm</span>
              <div class="saved-output-grid">
                ${plan.prayer_minutes ? `<div><strong>Quiet reflection</strong><p>${escapeHtml(plan.prayer_minutes)} minutes</p></div>` : ''}
                ${plan.bible_reading_minutes ? `<div><strong>Truth reading</strong><p>${escapeHtml(plan.bible_reading_minutes)} minutes</p></div>` : ''}
                ${plan.social_media_limit_minutes ? `<div><strong>Social media limit</strong><p>${escapeHtml(plan.social_media_limit_minutes)} minutes</p></div>` : ''}
                ${plan.fasting_recommendation ? `<div><strong>Reset practice</strong><p>${escapeHtml(plan.fasting_recommendation)}</p></div>` : ''}
                ${plan.community_action ? `<div><strong>Community</strong><p>${escapeHtml(plan.community_action)}</p></div>` : ''}
              </div>
            </div>`
          : ''
      }

      ${
        rootedVerses.length
          ? `<div class="saved-output-block">
              <span class="tag">Truth anchors</span>
              ${rootedVerses.map((verse) => `
                <blockquote class="saved-output-quote">${escapeHtml(verse.text || '')}</blockquote>
                <p>
                  <strong>${escapeHtml(verse.reference || '')}</strong>
                  ${verse.reflection_prompt ? ' — ' + escapeHtml(verse.reflection_prompt) : ''}
                </p>
              `).join('')}
            </div>`
          : ''
      }

      ${
        data.encouragement
          ? `<div class="saved-output-block">
              <span class="tag">Encouragement</span>
              <p>${escapeHtml(data.encouragement)}</p>
            </div>`
          : ''
      }
    `;

    const signalHtml = `
      ${
        data.overall_theme || data.article_summary
          ? `<div class="saved-output-block">
              <span class="tag">Signal summary</span>
              ${data.overall_theme ? `<h3>${escapeHtml(data.overall_theme)}</h3>` : ''}
              ${data.article_summary ? `<p>${escapeHtml(data.article_summary)}</p>` : ''}
            </div>`
          : ''
      }

      ${
        data.thinking_impact
          ? `<div class="saved-output-block">
              <span class="tag">Thinking impact</span>
              <p>${escapeHtml(data.thinking_impact)}</p>
            </div>`
          : ''
      }

      ${
        data.truth_check
          ? `<div class="saved-output-block">
              <span class="tag">Truth check</span>
              <p>${escapeHtml(data.truth_check)}</p>
            </div>`
          : ''
      }

      ${
        newsVerses.length
          ? `<div class="saved-output-block">
              <span class="tag">Truth anchors</span>
              ${newsVerses.map((verse) => `
                <blockquote class="saved-output-quote">${escapeHtml(verse.text || '')}</blockquote>
                <p>
                  <strong>${escapeHtml(verse.reference || '')}</strong>
                  ${verse.relevance_percent ? ` • ${escapeHtml(verse.relevance_percent)}% relevant` : ''}
                </p>
                ${verse.relevance_reason ? `<p>${escapeHtml(verse.relevance_reason)}</p>` : ''}
                ${verse.application ? `<p>${escapeHtml(verse.application)}</p>` : ''}
              `).join('')}
            </div>`
          : ''
      }

      ${
        data.exegesis
          ? `<div class="saved-output-block">
              <span class="tag">Deeper truth</span>
              <p>${escapeHtml(data.exegesis)}</p>
            </div>`
          : ''
      }

      ${
        data.jesus_lens
          ? `<div class="saved-output-block">
              <span class="tag">Grounded response</span>
              <p>${escapeHtml(data.jesus_lens)}</p>
            </div>`
          : ''
      }

      ${
        prayerPoints.length
          ? `<div class="saved-output-block">
              <span class="tag">Reflection steps</span>
              <ul>
                ${prayerPoints.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}
              </ul>
            </div>`
          : ''
      }
    `;

    const soundSenseHtml = `
      ${
        data.song || data.artist || data.bpm || data.key || data.instrument_label
          ? `<div class="saved-output-block">
              <span class="tag">SoundSense snapshot</span>
              <div class="saved-output-grid">
                ${data.song ? `<div><strong>Song</strong><p>${escapeHtml(data.song)}</p></div>` : ''}
                ${data.artist ? `<div><strong>Artist</strong><p>${escapeHtml(data.artist)}</p></div>` : ''}
                ${data.bpm ? `<div><strong>BPM</strong><p>${escapeHtml(data.bpm)}</p></div>` : ''}
                ${data.key ? `<div><strong>Key</strong><p>${escapeHtml(data.key)}</p></div>` : ''}
                ${data.instrument_label ? `<div><strong>Role</strong><p>${escapeHtml(data.instrument_label)}</p></div>` : ''}
                ${data.metadata_confidence ? `<div><strong>Confidence</strong><p>${escapeHtml(data.metadata_confidence)}</p></div>` : ''}
                ${data.confidence ? `<div><strong>Confidence</strong><p>${escapeHtml(data.confidence)}</p></div>` : ''}
              </div>
            </div>`
          : ''
      }

      ${
        data.song_meaning
          ? `<div class="saved-output-block">
              <span class="tag">Meaning</span>
              <p>${escapeHtml(data.song_meaning)}</p>
            </div>`
          : ''
      }

      ${
        data.faith_lens
          ? `<div class="saved-output-block">
              <span class="tag">Reflection</span>
              <p>${escapeHtml(data.faith_lens)}</p>
            </div>`
          : ''
      }

      ${
        data.arrangement_feel
          ? `<div class="saved-output-block">
              <span class="tag">Song flow</span>
              <p>${escapeHtml(data.arrangement_feel)}</p>
            </div>`
          : ''
      }

      ${
        data.listening_guide
          ? `<div class="saved-output-block">
              <span class="tag">Listen closely</span>
              <p>${escapeHtml(data.listening_guide)}</p>
            </div>`
          : ''
      }

      ${
        data.rehearsal_prep
          ? `<div class="saved-output-block">
              <span class="tag">Rehearsal moves</span>
              <p>${escapeHtml(data.rehearsal_prep)}</p>
            </div>`
          : ''
      }

      ${
        data.spiritual_reflection
          ? `<div class="saved-output-block">
              <span class="tag">Before you play</span>
              <p>${escapeHtml(data.spiritual_reflection)}</p>
            </div>`
          : ''
      }

      ${
        data.instrument_guidance
          ? `<div class="saved-output-block">
              <span class="tag">Role guidance</span>
              <p>${escapeHtml(data.instrument_guidance)}</p>
            </div>`
          : ''
      }

      ${
        data.team_prep
          ? `<div class="saved-output-block">
              <span class="tag">Team prep</span>
              <p>${escapeHtml(data.team_prep)}</p>
            </div>`
          : ''
      }
    `;

    if (isSoundSense) {
      return soundSenseHtml;
    }

    if (isSignal) {
      return signalHtml;
    }

    if (innerWorkHtml.trim()) {
      return innerWorkHtml;
    }

    return `
      <div class="saved-output-block">
        <span class="tag">Saved output</span>
        <pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>
      </div>
    `;
  }

  async function fetchSavedOutputs() {
    const { data, error } = await supabaseClient
      .from('saved_outputs')
      .select('id, app_type, title, input_summary, output_json, created_at')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });

    if (error) throw error;
    return data || [];
  }

  async function fetchJournalEntries() {
    const { data, error } = await supabaseClient
      .from('journal_entries')
      .select('id, saved_output_id, entry_text, created_at, updated_at')
      .eq('user_id', currentUser.id)
      .order('updated_at', { ascending: false });

    if (error) throw error;
    return data || [];
  }


  async function renderSavedTab() {
    setStatus('Loading saved outputs...');
    accountContent.innerHTML = '';

    try {
      const outputs = await fetchSavedOutputs();

      if (!outputs.length) {
        accountContent.innerHTML = `
          <h2>Saved Outputs</h2>
          <div class="empty-state">
            No saved outputs yet. Generate an Inner Work, Signal, or SoundSense result, then choose Save privately.
          </div>
        `;
        setStatus('');
        return;
      }

      accountContent.innerHTML = `
        <h2>Saved Outputs</h2>
        <div class="saved-list">
          ${outputs.map((item) => {
            const id = escapeHtml(item.id);
            const appLabel = getAppLabel(item.app_type);
            const title = item.title || `${appLabel} Output`;

            return `
              <article class="saved-card">
                <span class="pill">${escapeHtml(appLabel)}</span>
                <h3>${escapeHtml(title)}</h3>

                <p class="saved-card__meta">
                  Saved ${escapeHtml(formatDate(item.created_at))}
                  ${item.input_summary ? ` • ${escapeHtml(item.input_summary)}` : ''}
                </p>

                <div class="saved-card__actions">
                  <button class="btn primary" type="button" data-open-output="${id}">
                    Open
                  </button>
                  <button class="btn" type="button" data-journal-for="${id}">
                    Journal
                  </button>
                  <button class="btn" type="button" data-delete-output="${id}">
                    Delete
                  </button>
                </div>

                <div class="saved-output-layout" id="saved-layout-${id}" hidden>
                  <div class="saved-output-body" id="saved-output-${id}" hidden>
                    ${renderSavedOutputBody(item.output_json)}
                  </div>

                  <div class="saved-journal-panel" id="journal-${id}" hidden>
                    <h4>Private Journal</h4>
                    <p>Reflect on what you want to remember, apply, or keep rooted from this output.</p>

                    <textarea placeholder="Write a private journal entry for this saved output..."></textarea>

                    <div class="saved-card__actions">
                      <button class="btn primary" type="button" data-save-journal="${id}">
                        Save Journal Entry
                      </button>
                    </div>
                  </div>
                </div>
              </article>
            `;
          }).join('')}
        </div>
      `;

      setStatus('');
    } catch (error) {
      setStatus(error.message || 'Could not load saved outputs.', 'error');
    }
  }

  async function renderSharedTab() {
  accountContent.innerHTML = `
    <h2>Shared Links</h2>
    <div class="empty-state">
      Shared links are public by design, so anyone with the link can view them.
      For now, create shared links from Inner Work, Signal, or SoundSense after generating a result.
      A personal shared-link history can be added later after we connect shared links to your account.
    </div>
  `;

  setStatus('');
}

      accountContent.innerHTML = `
        <h2>Shared Links</h2>
        <div class="saved-list">
          ${links.map((item) => {
            const shareSlug = escapeHtml(item.share_slug);
            const appLabel = getAppLabel(item.app_type);
            const title = item.title || `${appLabel} Shared Link`;
            const shareUrl = `${window.location.origin}/share.html?id=${encodeURIComponent(item.share_slug)}`;

            return `
              <article class="saved-card">
                <span class="pill">${escapeHtml(appLabel)}</span>
                <h3>${escapeHtml(title)}</h3>

                <p class="saved-card__meta">
                  Shared ${escapeHtml(formatDate(item.created_at))}
                  ${item.input_summary ? ` • ${escapeHtml(item.input_summary)}` : ''}
                </p>

                <div class="saved-card__actions">
                  <a class="btn primary" href="${escapeHtml(shareUrl)}" target="_blank" rel="noopener">
                    Open Link
                  </a>
                  <button class="btn" type="button" data-copy-share="${shareSlug}">
                    Copy Link
                  </button>
                </div>
              </article>
            `;
          }).join('')}
        </div>
      `;

      setStatus('');
    } catch (error) {
      setStatus(error.message || 'Could not load shared links.', 'error');
    }
  }

  async function renderJournalTab() {
    setStatus('Loading journal entries...');
    accountContent.innerHTML = '';

    try {
      const entries = await fetchJournalEntries();

      if (!entries.length) {
        accountContent.innerHTML = `
          <h2>Journal</h2>
          <div class="empty-state">
            No journal entries yet. Open a saved output and write a private reflection.
          </div>
        `;
        setStatus('');
        return;
      }

      accountContent.innerHTML = `
        <h2>Journal</h2>
        <div class="saved-list">
          ${entries.map((entry) => `
            <article class="saved-card">
              <p>${escapeHtml(entry.entry_text)}</p>
              <p class="saved-card__meta">
                Updated ${escapeHtml(formatDate(entry.updated_at || entry.created_at))}
              </p>
            </article>
          `).join('')}
        </div>
      `;

      setStatus('');
    } catch (error) {
      setStatus(error.message || 'Could not load journal entries.', 'error');
    }
  }

  function renderCurrentTab() {
    if (!supabaseClient || !currentUser) return;

    if (currentTab === 'saved') {
      renderSavedTab();
    } else if (currentTab === 'shared') {
      renderSharedTab();
    } else if (currentTab === 'journal') {
      renderJournalTab();
    }
  }

  function setActiveTab(tab) {
    currentTab = tab;

    $$('.tab-button').forEach((button) => {
      button.classList.toggle('active', button.dataset.tab === tab);
    });

    renderCurrentTab();
  }

  accountContent.addEventListener('click', async (event) => {
    const openButton = event.target.closest('[data-open-output]');
    const journalButton = event.target.closest('[data-journal-for]');
    const saveJournalButton = event.target.closest('[data-save-journal]');
    const deleteButton = event.target.closest('[data-delete-output]');
    const copyShareButton = event.target.closest('[data-copy-share]');

    if (openButton) {
      const id = openButton.dataset.openOutput;
      const layout = document.getElementById(`saved-layout-${id}`);
      const outputPanel = document.getElementById(`saved-output-${id}`);
      const journalPanel = document.getElementById(`journal-${id}`);

      if (layout && outputPanel) {
        const shouldOpen = outputPanel.hidden;

        layout.hidden = false;
        outputPanel.hidden = !shouldOpen;
        openButton.textContent = shouldOpen ? 'Close' : 'Open';

        if (outputPanel.hidden && (!journalPanel || journalPanel.hidden)) {
          layout.hidden = true;
        }
      }

      return;
    }

    if (journalButton) {
      const id = journalButton.dataset.journalFor;
      const layout = document.getElementById(`saved-layout-${id}`);
      const outputPanel = document.getElementById(`saved-output-${id}`);
      const journalPanel = document.getElementById(`journal-${id}`);

      if (layout && journalPanel) {
        const shouldOpen = journalPanel.hidden;

        layout.hidden = false;
        journalPanel.hidden = !shouldOpen;
        journalButton.textContent = shouldOpen ? 'Close Journal' : 'Journal';

        if (journalPanel.hidden && (!outputPanel || outputPanel.hidden)) {
          layout.hidden = true;
        }
      }

      return;
    }

    if (saveJournalButton) {
      const savedOutputId = saveJournalButton.dataset.saveJournal;
      const panel = document.getElementById(`journal-${savedOutputId}`);
      const textarea = panel ? panel.querySelector('textarea') : null;
      const entryText = textarea ? textarea.value.trim() : '';

      if (!entryText) {
        setStatus('Write a journal entry before saving.', 'error');
        return;
      }

      saveJournalButton.disabled = true;
      setStatus('Saving journal entry...');

      const { error } = await supabaseClient
        .from('journal_entries')
        .insert({
          user_id: currentUser.id,
          saved_output_id: savedOutputId,
          entry_text: entryText
        });

      saveJournalButton.disabled = false;

      if (error) {
        setStatus(error.message || 'Could not save journal entry.', 'error');
        return;
      }

      textarea.value = '';
      setStatus('Journal entry saved.');
      return;
    }

    if (deleteButton) {
      const id = deleteButton.dataset.deleteOutput;

      const confirmDelete = window.confirm('Delete this saved output? This cannot be undone.');
      if (!confirmDelete) return;

      deleteButton.disabled = true;
      setStatus('Deleting saved output...');

      const { error } = await supabaseClient
        .from('saved_outputs')
        .delete()
        .eq('id', id)
        .eq('user_id', currentUser.id);

      if (error) {
        deleteButton.disabled = false;
        setStatus(error.message || 'Could not delete saved output.', 'error');
        return;
      }

      setStatus('Saved output deleted.');
      renderSavedTab();
      return;
    }

    if (copyShareButton) {
      const shareSlug = copyShareButton.dataset.copyShare;
      const shareUrl = `${window.location.origin}/share.html?id=${encodeURIComponent(shareSlug)}`;

      try {
        await navigator.clipboard.writeText(shareUrl);
        setStatus('Share link copied.');
      } catch {
        setStatus(shareUrl);
      }
    }
  });

  $$('.tab-button').forEach((button) => {
    button.addEventListener('click', () => setActiveTab(button.dataset.tab));
  });

  if (signOutButton) {
    signOutButton.addEventListener('click', async () => {
      if (!supabaseClient) return;

      signOutButton.disabled = true;

      await supabaseClient.auth.signOut();
      setLocalSignedInFlag(false);

      window.location.href = 'signin.html';
    });
  }

  async function loadSupabaseClient() {
    try {
      setStatus('Connecting to your account...');

      const response = await fetch('/api/public-config', {
        method: 'GET',
        cache: 'no-store'
      });

      const config = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(config.error || 'Could not load Supabase config.');
      }

      if (!config.supabaseUrl || !config.supabaseAnonKey) {
        throw new Error('Supabase configuration is incomplete.');
      }

      if (!window.supabase || !window.supabase.createClient) {
        throw new Error('Supabase browser client did not load.');
      }

      if (window.rootedbyteSupabase) {
        supabaseClient = window.rootedbyteSupabase;
      } else {
        supabaseClient = window.supabase.createClient(
          config.supabaseUrl,
          config.supabaseAnonKey
        );

        window.rootedbyteSupabase = supabaseClient;
      }

      const { data, error } = await supabaseClient.auth.getSession();

      if (error) {
        throw error;
      }

      if (!data.session) {
        setLocalSignedInFlag(false);
        window.location.href = 'signin.html';
        return;
      }

      currentUser = data.session.user;
      setLocalSignedInFlag(true);

      accountLead.textContent = `Signed in as ${currentUser.email}. Saved outputs are private unless you share them publicly.`;

      renderCurrentTab();
    } catch (error) {
      setLocalSignedInFlag(false);
      setStatus(error.message || 'Could not load account system.', 'error');
    }
  }

  loadSupabaseClient();
</script>
  
</body>
</html>
