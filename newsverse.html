<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="Signal helps you pause before reacting to posts, reels, headlines, threads, and news by checking what they are doing to your thinking."
  />

  <title>Signal | RootedByte</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #111714;
      --bg-deep: #0b100d;
      --panel: rgba(24, 32, 27, 0.9);
      --panel-strong: rgba(27, 37, 31, 0.98);
      --cream: #f5efe4;
      --muted: #9fb2a7;
      --muted-soft: #72857b;
      --line: rgba(168, 197, 160, 0.16);
      --line-strong: rgba(232, 201, 122, 0.34);
      --sage: #a8c5a0;
      --amber: #e8c97a;
      --lavender: #b8a8d8;
      --danger: #d97965;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --phone: 420px;
      --bottom-nav-height: 76px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: var(--bg-deep);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--cream);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(168, 197, 160, 0.06), transparent 18rem),
        radial-gradient(circle at 88% 20%, rgba(232, 201, 122, 0.08), transparent 18rem),
        radial-gradient(circle at 50% 100%, rgba(184, 168, 216, 0.05), transparent 20rem),
        var(--bg-deep);
      line-height: 1.55;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    img {
      display: block;
      max-width: 100%;
    }

    [hidden] {
      display: none !important;
    }

    .app-shell {
      width: min(var(--phone), 100%);
      min-height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% -10%, rgba(168, 197, 160, 0.08), transparent 18rem),
        linear-gradient(180deg, #111714 0%, #0f1512 100%);
      border-left: 1px solid rgba(168, 197, 160, 0.08);
      border-right: 1px solid rgba(168, 197, 160, 0.08);
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(17, 23, 20, 0.9);
      border-bottom: 1px solid rgba(168, 197, 160, 0.1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 12px;
      background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(135deg, var(--sage), var(--amber), var(--lavender)) border-box;
      border: 1px solid transparent;
      flex: 0 0 auto;
    }

    .brand-mark img {
      width: 118%;
      height: 118%;
      object-fit: cover;
      object-position: center;
      border-radius: 10px;
    }

    .brand-name {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--cream);
      white-space: nowrap;
    }

    .profile-button {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(168, 197, 160, 0.1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
    }

    .page {
      min-height: calc(100vh - 52px);
      padding: 18px 10px calc(var(--bottom-nav-height) + 26px);
    }

    .tool-topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .tool-topbar a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .screen-block {
      border-top: 1px solid rgba(168, 197, 160, 0.08);
      padding-top: 18px;
    }

    .hero-copy {
      padding: 8px 6px 18px;
    }

    .hero-copy h1,
    .result-card h2,
    .share-panel h3 {
      font-family: "Playfair Display", Georgia, serif;
      color: var(--cream);
      letter-spacing: -0.06em;
      line-height: 0.98;
      margin: 0;
    }

    .hero-copy h1 {
      font-size: 2.5rem;
    }

    .hero-copy p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.55;
      max-width: 330px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(25, 35, 29, 0.92), rgba(20, 28, 24, 0.9));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .signal-card {
      padding: 18px;
    }

    .form-card {
      padding: 16px;
      border: 1px solid rgba(168, 197, 160, 0.14);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.03);
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field + .field {
      margin-top: 18px;
    }

    .field label {
      color: var(--cream);
      font-size: 0.94rem;
      font-weight: 800;
    }

    .kind-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .kind-button {
      min-height: 34px;
      padding: 0 14px;
      border: 1px solid rgba(168, 197, 160, 0.16);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 180ms ease, background 180ms ease, color 180ms ease;
    }

    .kind-button:hover,
    .kind-button:focus-visible {
      border-color: rgba(232, 201, 122, 0.42);
      outline: none;
    }

    .kind-button.active {
      color: #111714;
      background: var(--amber);
      border-color: var(--amber);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(168, 197, 160, 0.2);
      border-radius: 12px;
      color: var(--cream);
      background: rgba(255, 255, 255, 0.04);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    input {
      min-height: 46px;
      padding: 0 14px;
    }

    textarea {
      min-height: 96px;
      padding: 13px 14px;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: #8ea297;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(232, 201, 122, 0.56);
      box-shadow: 0 0 0 3px rgba(232, 201, 122, 0.08);
      background: rgba(255, 255, 255, 0.055);
    }

    .primary-button,
    .secondary-button {
      min-height: 48px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary-button {
      border: 0;
      color: #111714;
      background: var(--amber);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .secondary-button {
      border: 1px solid rgba(168, 197, 160, 0.18);
      color: var(--cream);
      background: rgba(255, 255, 255, 0.04);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .primary-button:hover,
    .primary-button:focus-visible,
    .secondary-button:hover,
    .secondary-button:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.03);
      outline: none;
    }

    .ghost-note {
      margin-top: 10px;
      color: var(--muted-soft);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: var(--sage);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .status.error {
      color: var(--danger);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(232, 201, 122, 0.18);
      border-top-color: var(--amber);
      animation: spin 0.8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .results {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .result-card,
    .verse-card,
    .share-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.04);
      overflow: hidden;
    }

    .result-card,
    .verse-card,
    .share-panel {
      padding: 16px;
    }

    .result-card h2,
    .result-card h3,
    .verse-card h3 {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      color: var(--cream);
      letter-spacing: -0.04em;
    }

    .result-card p,
    .verse-card p,
    .share-panel p {
      color: var(--muted);
      line-height: 1.65;
    }

    .highlight {
      border-color: rgba(232, 201, 122, 0.26);
      background:
        linear-gradient(135deg, rgba(232, 201, 122, 0.08), rgba(255, 255, 255, 0.03));
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      color: var(--amber);
      background: rgba(232, 201, 122, 0.08);
      border: 1px solid rgba(232, 201, 122, 0.12);
      font-size: 0.73rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(232, 201, 122, 0.1);
      margin: 10px 0 4px;
    }

    .progress span {
      display: block;
      height: 100%;
      width: var(--width, 0%);
      background: var(--amber);
      border-radius: inherit;
    }

    .verse-grid {
      display: grid;
      gap: 12px;
    }

    .verse-card blockquote {
      margin: 8px 0;
      color: var(--cream);
      line-height: 1.65;
      font-size: 1rem;
    }

    .result-card ol,
    .result-card ul {
      margin: 10px 0 0;
      padding-left: 18px;
      color: var(--muted);
    }

    .result-card li + li {
      margin-top: 6px;
    }

    .share-panel__actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .share-link-box {
      width: 100%;
      min-height: 44px;
      margin-top: 10px;
      padding: 11px 12px;
      border: 1px solid rgba(168, 197, 160, 0.16);
      border-radius: 12px;
      color: var(--cream);
      background: rgba(255, 255, 255, 0.03);
      overflow-wrap: anywhere;
      font-size: 0.88rem;
      font-weight: 700;
    }

    .footer-card {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid rgba(168, 197, 160, 0.1);
    }

    .footer-brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .footer-socials {
      display: flex;
      gap: 12px;
      color: var(--muted);
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 16px;
      color: var(--muted-soft);
      font-size: 0.78rem;
    }

    .footer-links {
      display: flex;
      gap: 14px;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 60;
      width: min(var(--phone), 100%);
      height: var(--bottom-nav-height);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 8px 14px 10px;
      background: rgba(13, 18, 15, 0.94);
      border-top: 1px solid rgba(168, 197, 160, 0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .bottom-nav a {
      display: grid;
      place-items: center;
      gap: 3px;
      border-radius: 16px;
      color: var(--muted-soft);
      font-size: 0.68rem;
      font-weight: 700;
    }

    .bottom-nav a svg {
      width: 21px;
      height: 21px;
    }

    .bottom-nav a.active {
      color: var(--sage);
    }

    .bottom-nav a.tools-active {
      box-shadow: inset 0 0 0 2px var(--cream);
      background: rgba(168, 197, 160, 0.08);
    }

    @media (min-width: 760px) {
      body {
        padding: 18px 0;
      }

      .app-shell {
        min-height: calc(100vh - 36px);
        border-radius: 30px;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.36);
      }

      .bottom-nav {
        bottom: 18px;
        border-radius: 0 0 30px 30px;
      }
    }

    @media (max-width: 380px) {
      .share-panel__actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="index.html" aria-label="RootedByte home">
        <span class="brand-mark">
          <img src="images/rootedbyte-icon.png" alt="RootedByte logo" />
        </span>
        <span class="brand-name">RootedByte</span>
      </a>

      <a class="profile-button" href="signin.html" aria-label="Open account">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
          <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="1.8"/>
          <path d="M4.5 20a7.5 7.5 0 0 1 15 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </a>
    </header>

    <main class="page">
      <div class="tool-topbar">
        <a href="index.html">
          <span aria-hidden="true">←</span>
          <span>Tools</span>
        </a>
      </div>

      <section class="screen-block">
        <div class="hero-copy">
          <h1>Signal</h1>
          <p>Don’t let the feed disciple you. Paste what you saw. See what it’s really doing.</p>
        </div>

        <article class="card signal-card">
          <div class="form-card">
            <div class="field">
              <label>What kind of content?</label>
              <div class="kind-row" id="newsTypeButtons">
                <button class="kind-button active" type="button" data-type="post">Post</button>
                <button class="kind-button" type="button" data-type="headline">Headline</button>
                <button class="kind-button" type="button" data-type="thread">Thread</button>
                <button class="kind-button" type="button" data-type="reel">Reel</button>
                <button class="kind-button" type="button" data-type="trend">Trend</button>
                <button class="kind-button" type="button" data-type="news_story">News story</button>
              </div>
              <input type="hidden" id="newsType" value="post" />
            </div>

            <div class="field">
              <label for="newsArticleUrl">Paste the link</label>
              <input
                id="newsArticleUrl"
                type="url"
                placeholder="https://example.com/article or public post link"
              />
            </div>

            <div class="field">
              <label for="newsHeadline">Or paste the headline / post text</label>
              <textarea
                id="newsHeadline"
                placeholder="Paste a public link, headline, or copy the post text here..."
              ></textarea>
            </div>

            <button class="primary-button" type="button" id="newsAnalyzeButton">
              Run truth check
            </button>

            <div class="status" id="newsStatus" role="status" aria-live="polite"></div>
            <p class="ghost-note">
              Signal will be fully wired to the API in the JS step next.
            </p>
          </div>

          <div class="results" id="newsResult" aria-live="polite"></div>
        </article>

        <footer class="footer-card">
          <div class="footer-brand">
            <a class="brand" href="index.html" aria-label="RootedByte home">
              <span class="brand-mark">
                <img src="images/rootedbyte-icon.png" alt="" />
              </span>
              <span class="brand-name">RootedByte</span>
            </a>

            <div class="footer-socials" aria-label="Social links">
              <a href="https://www.youtube.com/channel/UCnPBSWzxDD7_r1HmVXhr3cA" target="_blank" rel="noopener" aria-label="RootedByte YouTube">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M22 12s0-4-1-5.3c-.6-.8-1.4-1-2.3-1.1C16.7 5.3 12 5.3 12 5.3s-4.7 0-6.7.3c-.9.1-1.7.3-2.3 1.1C2 8 2 12 2 12s0 4 1 5.3c.6.8 1.4 1 2.3 1.1 2 .3 6.7.3 6.7.3s4.7 0 6.7-.3c.9-.1 1.7-.3 2.3-1.1C22 16 22 12 22 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M10 9.5v5l4.5-2.5L10 9.5Z" fill="currentColor"/>
                </svg>
              </a>

              <a href="mailto:rootedbyte@outlook.com" aria-label="Email RootedByte">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 6h16v12H4V6Z" stroke="currentColor" stroke-width="1.8" />
                  <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                </svg>
              </a>
            </div>
          </div>

          <div class="footer-bottom">
            <p>© <span id="year"></span> RootedByte</p>
            <div class="footer-links">
              <a href="mailto:rootedbyte@outlook.com">Contact</a>
              <a href="privacy.html">Privacy</a>
            </div>
          </div>
        </footer>
      </section>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="index.html">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="m4 10 8-7 8 7v10H6V11" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M10 20v-6h4v6" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      <span>Home</span>
    </a>

    <a href="index.html#screen-tools" class="active tools-active">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/>
        <path d="m15 9-2 5-4 1 2-5 4-1Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      <span>Tools</span>
    </a>

    <a href="index.html#screen-journal">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 5.5A2.5 2.5 0 0 1 7.5 3H20v16H7.5A2.5 2.5 0 0 0 5 21V5.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M5 5.5A2.5 2.5 0 0 0 2.5 3H2v16h.5A2.5 2.5 0 0 1 5 21" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      <span>Journal</span>
    </a>

    <a href="index.html#screen-growth">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 16l5-5 4 4 7-8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16 7h4v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Growth</span>
    </a>
  </nav>

  <script>
    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    const year = $("#year");
    if (year) year.textContent = new Date().getFullYear();

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setStatus(element, message, type = "info", loading = false) {
      if (!element) return;

      element.className = type === "error" ? "status error" : "status";
      element.innerHTML = loading
        ? '<span class="spinner" aria-hidden="true"></span><span>' + escapeHtml(message) + "</span>"
        : escapeHtml(message);
    }

    async function postJson(url, body) {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.error || "Something went wrong. Please try again.");
      }

      return data;
    }

    $$("#newsTypeButtons .kind-button").forEach((button) => {
      button.addEventListener("click", () => {
        $$("#newsTypeButtons .kind-button").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        $("#newsType").value = button.dataset.type || "post";
      });
    });

    function renderNewsResult(data) {
      const verses = Array.isArray(data.verses) ? data.verses : [];
      const prayerPoints = Array.isArray(data.prayer_points) ? data.prayer_points : [];
      const publicPath = data.source_mode === "headline_only";

      return `
        <div class="result-card ${publicPath ? "highlight" : ""}">
          <span class="tag">${publicPath ? "Headline-based reflection" : "Article summary"}</span>
          <h2>${escapeHtml(data.overall_theme || "Signal reflection")}</h2>
          <p>${escapeHtml(data.article_summary || "")}</p>
        </div>

        <div class="result-card">
          <span class="tag">What this is shaping</span>
          <h3>Thinking impact</h3>
          <p>${escapeHtml(data.thinking_impact || "")}</p>
          ${
            typeof data.emotional_temperature_score === "number"
              ? `
              <div class="progress" aria-label="Emotional temperature">
                <span style="--width:${Math.max(0, Math.min(100, data.emotional_temperature_score))}%"></span>
              </div>
              <p>Emotional temperature: ${Math.round(data.emotional_temperature_score)}/100</p>
            `
              : ""
          }
        </div>

        <div class="result-card">
          <span class="tag">Truth check</span>
          <h3>Discernment notes</h3>
          <p>${escapeHtml(data.truth_check || "")}</p>
          ${data.exegesis ? `<p>${escapeHtml(data.exegesis)}</p>` : ""}
          ${data.jesus_lens ? `<p><strong>Jesus lens:</strong> ${escapeHtml(data.jesus_lens)}</p>` : ""}
        </div>

        ${
          prayerPoints.length
            ? `
            <div class="result-card">
              <span class="tag">Prayer points</span>
              <ol>
                ${prayerPoints.map((point) => `<li>${escapeHtml(point)}</li>`).join("")}
              </ol>
            </div>
          `
            : ""
        }

        ${
          verses.length
            ? `
            <div class="verse-grid">
              ${verses.slice(0, 3).map((verse) => `
                <article class="verse-card">
                  <span class="tag">Reflection verse</span>
                  <blockquote>${escapeHtml(verse.text || "")}</blockquote>
                  <p><strong>${escapeHtml(verse.reference || "")}</strong></p>
                  ${verse.application ? `<p>${escapeHtml(verse.application)}</p>` : ""}
                </article>
              `).join("")}
            </div>
          `
            : ""
        }
      `;
    }

    function renderSharePanel() {
      return `
        <div class="share-panel">
          <h3>Save or share this Signal check</h3>
          <p>
            Save privately to your account, or create a public RootedByte link
            that anyone with the link can view.
          </p>

          <div class="share-panel__actions">
            <button class="primary-button" type="button" id="saveNewsOutput">
              Save privately
            </button>

            <button class="secondary-button" type="button" id="shareNewsOutput">
              Share publicly
            </button>
          </div>

          <div class="status" id="newsSaveStatus" role="status" aria-live="polite"></div>
          <div class="status" id="newsShareStatus" role="status" aria-live="polite"></div>
          <div class="share-link-box" id="newsShareLink" hidden></div>
        </div>
      `;
    }

    async function createSharedOutput({ appType, title, inputSummary, output, statusElement, linkElement }) {
      statusElement.textContent = "Creating share link...";

      const response = await fetch("/api/share", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          appType,
          title,
          inputSummary,
          output
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Could not create share link.");
      }

      linkElement.hidden = false;
      linkElement.textContent = data.shareUrl;

      try {
        await navigator.clipboard.writeText(data.shareUrl);
        statusElement.textContent = "Share link created and copied.";
      } catch {
        statusElement.textContent = "Share link created.";
      }

      if (navigator.share) {
        try {
          await navigator.share({
            title,
            text: `View this ${title} from RootedByte.`,
            url: data.shareUrl
          });
        } catch {
          // user cancelled share
        }
      }

      return data;
    }

    function attachNewsSaveButton(outputData) {
      const button = document.querySelector("#saveNewsOutput");
      const statusElement = document.querySelector("#newsSaveStatus");

      if (!button || !statusElement) return;

      button.addEventListener("click", async () => {
        button.disabled = true;
        statusElement.className = "status";
        statusElement.textContent = "Saving privately...";

        try {
          if (!window.RootedByteSaveOutput || !window.RootedByteSaveOutput.save) {
            throw new Error("Private saving is not ready yet. Please refresh and try again.");
          }

          const result = await window.RootedByteSaveOutput.save({
            appType: "newsverse",
            title: "Signal Truth Check",
            inputSummary: "Private Signal truth check",
            outputJson: outputData
          });

          if (!result.ok) {
            statusElement.className = "status error";
            statusElement.textContent = result.message || "Could not save privately.";
            return;
          }

          statusElement.className = "status";
          statusElement.textContent = "Saved privately to your account.";
        } catch (error) {
          statusElement.className = "status error";
          statusElement.textContent = error.message || "Could not save privately.";
        } finally {
          button.disabled = false;
        }
      });
    }

    function attachNewsShareButton(outputData) {
      const button = document.querySelector("#shareNewsOutput");
      const statusElement = document.querySelector("#newsShareStatus");
      const linkElement = document.querySelector("#newsShareLink");

      if (!button || !statusElement || !linkElement) return;

      button.addEventListener("click", async () => {
        button.disabled = true;

        try {
          await createSharedOutput({
            appType: "newsverse",
            title: "Signal Truth Check",
            inputSummary: "Shared Signal truth check",
            output: outputData,
            statusElement,
            linkElement
          });
        } catch (error) {
          statusElement.className = "status error";
          statusElement.textContent = error.message;
        } finally {
          button.disabled = false;
        }
      });
    }

    $("#newsAnalyzeButton").addEventListener("click", async () => {
      const newsType = $("#newsType").value || "post";
      const articleUrl = $("#newsArticleUrl").value.trim();
      const headline = $("#newsHeadline").value.trim();
      const status = $("#newsStatus");
      const result = $("#newsResult");

      if (!articleUrl && !headline) {
        setStatus(status, "Paste a link or some content before running Signal.", "error");
        return;
      }

      result.innerHTML = "";
      setStatus(status, "Checking the signal...", "info", true);

      try {
        const data = await postJson("/api/newsverse", {
          newsType,
          articleUrl,
          headline
        });

        result.innerHTML = renderNewsResult(data) + renderSharePanel();
        attachNewsSaveButton(data);
        attachNewsShareButton(data);
        setStatus(status, "Signal check ready.");
      } catch (error) {
        setStatus(status, error.message, "error");
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/rootedbyte-auth-nav.js"></script>
  <script src="js/rootedbyte-save-output.js"></script>
</body>
