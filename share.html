<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="A shared RootedByte reflection created with RootedOS or NewsVerse."
  />

  <title>Shared Reflection | RootedByte</title>

  <style>
    :root {
      --bg: #eef3ea;
      --bg-soft: #fbf8ef;
      --card: rgba(255, 252, 244, 0.9);
      --card-strong: rgba(255, 255, 255, 0.96);
      --text: #17231b;
      --muted: #647363;
      --line: rgba(23, 35, 27, 0.12);
      --forest: #254d35;
      --forest-dark: #142a1e;
      --cream: #fbf8ef;
      --gold: #c99a52;
      --shadow: 0 24px 70px rgba(34, 48, 37, 0.13);
      --radius: 30px;
      --max: 980px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 77, 53, 0.14), transparent 30rem),
        radial-gradient(circle at 86% 12%, rgba(111, 127, 79, 0.15), transparent 30rem),
        linear-gradient(180deg, #fbf8ef 0%, #eef3ea 52%, #dfe8d9 100%);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(18px);
      background: rgba(251, 248, 239, 0.84);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      width: min(var(--max), 100%);
      margin: 0 auto;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-weight: 900;
      letter-spacing: -0.04em;
      font-size: 1.15rem;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      padding: 3px;
      border: 2px solid transparent;
      border-radius: 17px;
      background:
        linear-gradient(var(--cream), var(--cream)) padding-box,
        linear-gradient(135deg, #ff6b6b, #f7b267, #ffe66d, #4ecdc4, #5b8def, #b388ff) border-box;
      overflow: hidden;
      flex: 0 0 auto;
      box-shadow: 0 10px 24px rgba(34, 48, 37, 0.14);
    }

    .brand-mark img {
      width: 118%;
      height: 118%;
      object-fit: cover;
      object-position: center;
      display: block;
      border-radius: 14px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-links a {
      color: var(--muted);
      padding: 9px 13px;
      border-radius: 999px;
      transition: background 180ms ease, color 180ms ease;
      font-size: 0.95rem;
      font-weight: 850;
    }

    .nav-links a:hover {
      color: var(--text);
      background: rgba(37, 77, 53, 0.1);
    }

    .page {
      width: min(var(--max), calc(100% - 2rem));
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 4rem) 0;
    }

    .hero-card,
    .result-card,
    .area-card,
    .verse-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .hero-card {
      padding: clamp(1.5rem, 4vw, 3rem);
      margin-bottom: 1rem;
      background:
        linear-gradient(135deg, rgba(255, 252, 244, 0.94), rgba(255, 255, 255, 0.86)),
        radial-gradient(circle at top right, rgba(37, 77, 53, 0.1), transparent 18rem);
    }

    .pill {
      display: inline-flex;
      margin-bottom: 1rem;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      color: var(--forest-dark);
      background: rgba(37, 77, 53, 0.1);
      border: 1px solid rgba(37, 77, 53, 0.16);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.05;
      letter-spacing: -0.055em;
      color: var(--text);
    }

    h1 {
      font-size: clamp(2.6rem, 7vw, 5.3rem);
      font-weight: 950;
    }

    h2 {
      font-size: clamp(1.7rem, 4vw, 3rem);
      font-weight: 950;
    }

    h3 {
      font-size: clamp(1.25rem, 3vw, 1.8rem);
      font-weight: 920;
    }

    .lead,
    .muted,
    .result-card p,
    .area-body,
    .verse-card p {
      color: var(--muted);
    }

    .lead {
      max-width: 760px;
      margin: 1rem 0 0;
      font-size: clamp(1.04rem, 2vw, 1.22rem);
    }

    .results {
      display: grid;
      gap: 1rem;
      margin-top: 1rem;
    }

    .result-card,
    .verse-card {
      padding: 1.25rem;
      background: var(--card-strong);
    }

    .highlight {
      border-color: rgba(201, 154, 82, 0.32);
      background:
        linear-gradient(135deg, rgba(201, 154, 82, 0.12), rgba(255, 255, 255, 0.9));
    }

    .area-list,
    .verse-grid {
      display: grid;
      gap: 1rem;
    }

    details.area-card {
      padding: 0;
      overflow: hidden;
      background: var(--card-strong);
    }

    details.area-card summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      padding: 18px;
      font-weight: 900;
    }

    details.area-card summary::-webkit-details-marker {
      display: none;
    }

    .area-body {
      padding: 0 18px 18px;
    }

    .badge {
      color: var(--cream);
      background: linear-gradient(135deg, var(--forest-dark), var(--forest));
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .plan-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .plan-item {
      border-radius: 18px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
    }

    blockquote {
      margin: 0.75rem 0;
      border-left: 4px solid var(--forest);
      padding-left: 1rem;
      color: var(--text);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .btn {
      min-height: 48px;
      border-radius: 999px;
      padding: 0 1.15rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255, 255, 255, 0.78);
      font-weight: 900;
      cursor: pointer;
    }

    .btn.primary {
      color: var(--cream);
      background: linear-gradient(135deg, var(--forest-dark), var(--forest));
      border: 0;
    }

    .status {
      margin-top: 1rem;
      color: var(--muted);
      font-weight: 800;
    }

    footer {
      text-align: center;
      color: var(--muted);
      padding: 2rem 1rem 2.5rem;
    }

    @media (max-width: 720px) {
      .nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav-links {
        justify-content: flex-start;
      }

      .plan-grid {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="index.html" aria-label="RootedByte home">
        <span class="brand-mark">
          <img src="images/rootedbyte-icon.png" alt="" />
        </span>
        <span>RootedByte</span>
      </a>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="tone.html">Song DiveIn</a>
        <a href="newsverse.html">NewsVerse</a>
        <a href="rootedos.html">RootedOS</a>
      </div>
    </nav>
  </header>

  <main class="page">
    <section class="hero-card">
      <span class="pill" id="appPill">Shared Reflection</span>
      <h1 id="shareTitle">Loading shared reflection...</h1>
      <p class="lead" id="shareIntro">
        This RootedByte reflection is being loaded.
      </p>

      <div class="actions" id="shareActions" hidden>
        <a class="btn primary" id="tryAppLink" href="index.html">Try this app</a>
        <a class="btn" href="index.html">Visit RootedByte</a>
      </div>

      <div class="status" id="shareStatus" role="status" aria-live="polite"></div>
    </section>

    <section class="results" id="sharedResult" aria-live="polite"></section>
  </main>

  <footer>
    <p>© <span id="year"></span> RootedByte. Built for digital wisdom rooted in truth.</p>
  </footer>

  <script>
  const $ = (selector) => document.querySelector(selector);

  const year = $("#year");
  if (year) year.textContent = new Date().getFullYear();

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function getShareId() {
    const params = new URLSearchParams(window.location.search);
    return String(params.get("id") || "").trim();
  }

  function formatDate(value) {
    if (!value) return "";

    try {
      return new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "long",
        day: "numeric"
      }).format(new Date(value));
    } catch {
      return "";
    }
  }

  function renderSharedTextBlock(value) {
    const text = String(value || "").trim();

    if (!text) return "<p>No details available.</p>";

    if (/<\/?[a-z][\s\S]*>/i.test(text)) {
      return text;
    }

    const lines = text
      .split("\n")
      .map((line) => line.trim())
      .filter(Boolean);

    if (lines.length <= 1) {
      return `<p>${escapeHtml(lines[0])}</p>`;
    }

    return `
      <ul>
        ${lines
          .map((line) => `<li>${escapeHtml(line.replace(/^[-•*]\s*/, ""))}</li>`)
          .join("")}
      </ul>
    `;
  }

  function renderRootedOS(output) {
    const areas = Array.isArray(output.areas) ? output.areas : [];
    const plan = output.daily_plan || {};
    const verses = Array.isArray(output.reflection_verses) ? output.reflection_verses.slice(0, 3) : [];

    return `
      <article class="result-card">
        <span class="pill">RootedOS Summary</span>
        <h2>Your RootedOS reflection</h2>
        <p class="lead">${escapeHtml(output.summary || "Shared RootedOS reflection.")}</p>
      </article>

      ${
        areas.length
          ? `<div class="area-list">
              ${areas.map((area) => `
                <details class="area-card">
                  <summary>
                    <span>${escapeHtml(area.area || "Growth area")}</span>
                    <span class="badge">${escapeHtml(area.urgency || "Reflect")}</span>
                  </summary>
                  <div class="area-body">
                    <p><strong>Current state:</strong> ${escapeHtml(area.current_state || "")}</p>
                    <p><strong>Recommendation:</strong> ${escapeHtml(area.recommendation || "")}</p>
                    <p><strong>Scripture:</strong> ${escapeHtml(area.scripture || "")}</p>
                    <p><strong>Action step:</strong> ${escapeHtml(area.action_step || "")}</p>
                  </div>
                </details>
              `).join("")}
            </div>`
          : ""
      }

      ${
        Object.keys(plan).length
          ? `<article class="result-card">
              <span class="pill">Daily Plan</span>
              <div class="plan-grid">
                <div class="plan-item"><strong>Prayer</strong><p>${escapeHtml(plan.prayer_minutes || "")} minutes</p></div>
                <div class="plan-item"><strong>Bible reading</strong><p>${escapeHtml(plan.bible_reading_minutes || "")} minutes</p></div>
                <div class="plan-item"><strong>Social media limit</strong><p>${escapeHtml(plan.social_media_limit_minutes || "")} minutes</p></div>
                <div class="plan-item"><strong>Fasting</strong><p>${escapeHtml(plan.fasting_recommendation || "")}</p></div>
                <div class="plan-item"><strong>Community</strong><p>${escapeHtml(plan.community_action || "")}</p></div>
              </div>
            </article>`
          : ""
      }

      ${
        verses.length
          ? `<article class="result-card highlight">
              <span class="pill">Verses to Reflect On</span>
              ${verses.map((verse) => `
                <blockquote>${escapeHtml(verse.text || "")}</blockquote>
                <p>
                  <strong>${escapeHtml(verse.reference || "")}</strong>
                  ${verse.reflection_prompt ? " — " + escapeHtml(verse.reflection_prompt) : ""}
                </p>
              `).join("")}
            </article>`
          : ""
      }

      ${
        output.encouragement
          ? `<article class="result-card">
              <span class="pill">Encouragement</span>
              <p>${escapeHtml(output.encouragement)}</p>
            </article>`
          : ""
      }
    `;
  }

  function renderNewsVerse(output) {
    const verses = Array.isArray(output.verses) ? output.verses : [];
    const prayers = Array.isArray(output.prayer_points) ? output.prayer_points : [];

    return `
      <article class="result-card ${output.source_mode === "headline_only" ? "highlight" : ""}">
        <span class="pill">${output.source_mode === "headline_only" ? "Headline-Based Reflection" : "Article Summary"}</span>
        <h2>${escapeHtml(output.overall_theme || "NewsVerse reflection")}</h2>
        <p>${escapeHtml(output.article_summary || "Shared NewsVerse reflection.")}</p>
      </article>

      ${
        verses.length
          ? `<div class="verse-grid">
              ${verses.map((verse) => `
                <article class="verse-card">
                  <strong>${escapeHtml(verse.reference || "Scripture")}</strong>
                  <blockquote>${escapeHtml(verse.text || "")}</blockquote>
                  <p>${escapeHtml(verse.relevance_reason || "")}</p>
                </article>
              `).join("")}
            </div>`
          : ""
      }

      ${
        output.exegesis
          ? `<article class="result-card">
              <span class="pill">Exegesis</span>
              <p>${escapeHtml(output.exegesis)}</p>
            </article>`
          : ""
      }

      ${
        output.jesus_lens
          ? `<article class="result-card highlight">
              <span class="pill">Jesus Lens</span>
              <p>${escapeHtml(output.jesus_lens)}</p>
            </article>`
          : ""
      }

      ${
        prayers.length
          ? `<article class="result-card">
              <span class="pill">Prayer Points</span>
              <ol>${prayers.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ol>
            </article>`
          : ""
      }
    `;
  }

  function renderTone(output) {
    const song = output.song || "Shared Song DiveIn Prep";
    const artist = output.artist || "";
    const title = artist ? `${song} by ${artist}` : song;

    const details = [
      ["BPM", output.bpm],
      ["Key", output.key],
      ["Confidence", output.metadata_confidence],
      ["Role", output.instrument_label]
    ].filter((item) => item[1]);

    const cards = [
      ["Heart Check", output.song_meaning],
      ["Faith Lens", output.faith_lens],
      ["Song Flow", output.arrangement_feel],
      ["Listen Closely", output.listening_guide],
      ["Rehearsal Moves", output.rehearsal_prep],
      ["Before You Lead", output.spiritual_reflection],
      ["Role Coaching", output.instrument_guidance]
    ].filter((item) => item[1]);

    return `
      <article class="result-card">
        <span class="pill">Song DiveIn Summary</span>
        <h2>${escapeHtml(title)}</h2>
        ${
          details.length
            ? `<div class="plan-grid">
                ${details.map(([label, value]) => `
                  <div class="plan-item">
                    <strong>${escapeHtml(label)}</strong>
                    <p>${escapeHtml(value)}</p>
                  </div>
                `).join("")}
              </div>`
            : ""
        }
      </article>

      ${cards.map(([label, value], index) => `
        <article class="result-card ${index === 1 ? "highlight" : ""}">
          <span class="pill">${escapeHtml(label)}</span>
          ${renderSharedTextBlock(value)}
        </article>
      `).join("")}
    `;
  }

  function getAppMeta(appType) {
    if (appType === "rootedos") {
      return {
        appName: "RootedOS",
        tryHref: "rootedos.html",
        tryLabel: "Try RootedOS",
        render: renderRootedOS
      };
    }

    if (appType === "newsverse") {
      return {
        appName: "NewsVerse",
        tryHref: "newsverse.html",
        tryLabel: "Try NewsVerse",
        render: renderNewsVerse
      };
    }

    if (appType === "tone") {
      return {
        appName: "Song DiveIn",
        tryHref: "tone.html",
        tryLabel: "Try Song DiveIn",
        render: renderTone
      };
    }

    return {
      appName: "RootedByte",
      tryHref: "index.html",
      tryLabel: "Visit RootedByte",
      render: (output) => `
        <article class="result-card">
          <span class="pill">Shared Reflection</span>
          <pre>${escapeHtml(JSON.stringify(output, null, 2))}</pre>
        </article>
      `
    };
  }

  async function loadSharedOutput() {
    const id = getShareId();
    const status = $("#shareStatus");
    const result = $("#sharedResult");

    if (!id) {
      $("#shareTitle").textContent = "Shared reflection not found";
      $("#shareIntro").textContent = "This link is missing a shared reflection ID.";
      status.textContent = "";
      return;
    }

    status.textContent = "Loading shared reflection...";

    try {
      const response = await fetch(`/api/shared?id=${encodeURIComponent(id)}`);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Shared reflection not found.");
      }

      const meta = getAppMeta(data.appType);
      const createdDate = formatDate(data.createdAt);

      $("#appPill").textContent = `Shared ${meta.appName}`;
      $("#shareTitle").textContent = data.title || `Shared ${meta.appName} Reflection`;
      $("#shareIntro").textContent = createdDate
        ? `Created with ${meta.appName} by RootedByte on ${createdDate}.`
        : `Created with ${meta.appName} by RootedByte.`;

      $("#tryAppLink").href = meta.tryHref;
      $("#tryAppLink").textContent = meta.tryLabel;
      $("#shareActions").hidden = false;

      result.innerHTML = meta.render(data.output || {});
      status.textContent = "";
    } catch (error) {
      $("#shareTitle").textContent = "Shared reflection not found";
      $("#shareIntro").textContent = "This shared link may be incorrect, private, deleted, or expired.";
      result.innerHTML = "";
      status.textContent = error.message;
    }
  }

  loadSharedOutput();
</script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/rootedbyte-auth-nav.js"></script>
  
</body>
</html>
