<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="A shared RootedByte reflection created with Inner Work, Signal, or SoundSense."
  />

  <title>Shared Reflection | RootedByte</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #111714;
      --bg-deep: #0b100d;
      --panel: rgba(24, 32, 27, 0.92);
      --panel-strong: rgba(27, 37, 31, 0.98);
      --cream: #f5efe4;
      --muted: #9fb2a7;
      --muted-soft: #72857b;
      --line: rgba(168, 197, 160, 0.16);
      --sage: #a8c5a0;
      --amber: #e8c97a;
      --lavender: #b8a8d8;
      --danger: #d97965;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --phone: 420px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg-deep);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--cream);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(168, 197, 160, 0.08), transparent 18rem),
        radial-gradient(circle at 88% 20%, rgba(232, 201, 122, 0.06), transparent 18rem),
        radial-gradient(circle at 50% 100%, rgba(184, 168, 216, 0.06), transparent 20rem),
        var(--bg-deep);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .app-shell {
      width: min(var(--phone), 100%);
      min-height: 100vh;
      margin: 0 auto;
      background:
        radial-gradient(circle at 50% -10%, rgba(168, 197, 160, 0.08), transparent 18rem),
        linear-gradient(180deg, #111714 0%, #0f1512 100%);
      border-left: 1px solid rgba(168, 197, 160, 0.08);
      border-right: 1px solid rgba(168, 197, 160, 0.08);
      overflow: hidden;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(17, 23, 20, 0.9);
      border-bottom: 1px solid rgba(168, 197, 160, 0.1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 12px;
      background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(135deg, var(--sage), var(--amber), var(--lavender)) border-box;
      border: 1px solid transparent;
      flex: 0 0 auto;
    }

    .brand-mark img {
      width: 118%;
      height: 118%;
      object-fit: cover;
      object-position: center;
      border-radius: 10px;
    }

    .brand-name {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--cream);
      white-space: nowrap;
    }

    .header-link {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .page {
      padding: 18px 12px 30px;
    }

    .hero-card,
    .result-card,
    .area-card,
    .verse-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(25, 35, 29, 0.94), rgba(20, 28, 24, 0.92));
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 20px 18px;
    }

    .pill,
    .badge,
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 0.73rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .pill,
    .tag {
      color: var(--sage);
      background: rgba(168, 197, 160, 0.08);
      border: 1px solid rgba(168, 197, 160, 0.12);
    }

    .badge {
      color: var(--amber);
      background: rgba(232, 201, 122, 0.08);
      border: 1px solid rgba(232, 201, 122, 0.14);
      letter-spacing: 0.04em;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      color: var(--cream);
      font-family: "Playfair Display", Georgia, serif;
      line-height: 1.02;
      letter-spacing: -0.055em;
    }

    h1 {
      margin-top: 16px;
      font-size: 2.2rem;
    }

    h2 {
      font-size: 1.45rem;
    }

    h3 {
      font-size: 1.08rem;
    }

    .lead,
    .muted,
    .result-card p,
    .area-body,
    .verse-card p,
    .status {
      color: var(--muted);
    }

    .lead {
      margin: 12px 0 0;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .results {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .result-card,
    .verse-card {
      padding: 16px;
    }

    .highlight {
      border-color: rgba(232, 201, 122, 0.22);
      background:
        linear-gradient(135deg, rgba(232, 201, 122, 0.08), rgba(255, 255, 255, 0.03));
    }

    .area-list,
    .verse-grid {
      display: grid;
      gap: 12px;
    }

    details.area-card {
      overflow: hidden;
    }

    details.area-card summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px;
      color: var(--cream);
      font-weight: 800;
    }

    details.area-card summary::-webkit-details-marker {
      display: none;
    }

    .area-body {
      padding: 0 16px 16px;
    }

    .plan-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .plan-item {
      border-radius: var(--radius-md);
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(168, 197, 160, 0.12);
    }

    blockquote {
      margin: 10px 0 8px;
      border-left: 3px solid var(--sage);
      padding-left: 12px;
      color: var(--cream);
      font-size: 0.98rem;
      line-height: 1.65;
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      min-height: 46px;
      border-radius: 12px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(168, 197, 160, 0.16);
      color: var(--cream);
      background: rgba(255, 255, 255, 0.04);
      font-weight: 800;
      cursor: pointer;
    }

    .btn.primary {
      color: #111714;
      background: var(--sage);
      border-color: var(--sage);
    }

    .status {
      margin-top: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      min-height: 24px;
    }

    .footer-strip {
      margin-top: 18px;
      color: var(--muted-soft);
      font-size: 0.78rem;
      text-align: center;
    }

    .footer-strip a {
      color: var(--muted);
    }

    @media (min-width: 760px) {
      body {
        padding: 18px 0;
      }

      .app-shell {
        min-height: calc(100vh - 36px);
        border-radius: 30px;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.36);
      }
    }

    @media (min-width: 980px) {
  :root {
    --phone: 1180px;
  }

  body {
    padding: 0;
  }

  .app-shell {
    width: min(1180px, calc(100% - 48px));
    min-height: 100vh;
    border-left: 0;
    border-right: 0;
    border-radius: 0;
    box-shadow: none;
  }

  .app-header {
    height: 72px;
    padding: 0 28px;
  }

  .brand-name {
    font-size: 1.15rem;
  }

  .header-link {
    font-size: 0.92rem;
  }

  .page {
    padding: 42px 28px 60px;
  }

  .hero-card {
    padding: 30px 28px;
    max-width: 960px;
  }

  h1 {
    font-size: clamp(3rem, 6vw, 4.8rem);
    max-width: 780px;
  }

  .lead {
    max-width: 760px;
    font-size: 1rem;
  }

  .actions {
    grid-template-columns: 220px 220px;
    align-items: start;
    justify-content: start;
  }

  .results {
    margin-top: 18px;
    gap: 16px;
  }

  .plan-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .verse-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .footer-strip {
    margin-top: 28px;
    text-align: left;
  }
}
    
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="index.html" aria-label="RootedByte home">
        <span class="brand-mark">
          <img src="images/rootedbyte-icon.png" alt="RootedByte logo" />
        </span>
        <span class="brand-name">RootedByte</span>
      </a>

      <a class="header-link" href="index.html">Home</a>
    </header>

    <main class="page">
      <section class="hero-card">
        <span class="pill" id="appPill">Shared Reflection</span>
        <h1 id="shareTitle">Loading shared reflection...</h1>
        <p class="lead" id="shareIntro">
          This RootedByte reflection is being loaded.
        </p>

        <div class="actions" id="shareActions" hidden>
          <a class="btn primary" id="tryAppLink" href="index.html">Try this app</a>
          <a class="btn" href="index.html">Visit RootedByte</a>
        </div>

        <div class="status" id="shareStatus" role="status" aria-live="polite"></div>
      </section>

      <section class="results" id="sharedResult" aria-live="polite"></section>

      <div class="footer-strip">
        © <span id="year"></span> RootedByte ·
        <a href="privacy.html">Privacy</a> ·
        <a href="mailto:rootedbyte@outlook.com">Contact</a>
      </div>
    </main>
  </div>

  <script>
  const $ = (selector) => document.querySelector(selector);

  const year = $("#year");
  if (year) year.textContent = new Date().getFullYear();

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function normalizeAppType(appType) {
    const value = String(appType || "").trim().toLowerCase();

    const map = {
      rootedos: "inner_work",
      "inner work": "inner_work",
      inner_work: "inner_work",

      newsverse: "signal",
      signal: "signal",

      tone: "soundsense",
      soundsense: "soundsense",
      "sound sense": "soundsense"
    };

    return map[value] || value || "inner_work";
  }

  function getShareId() {
    const params = new URLSearchParams(window.location.search);
    return String(params.get("id") || "").trim();
  }

  function formatDate(value) {
    if (!value) return "";

    try {
      return new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "long",
        day: "numeric"
      }).format(new Date(value));
    } catch {
      return "";
    }
  }

  function renderSharedTextBlock(value) {
    const text = String(value || "").trim();

    if (!text) return "<p>No details available.</p>";

    if (/<\/?[a-z][\s\S]*>/i.test(text)) {
      return text;
    }

    const lines = text
      .split("\n")
      .map((line) => line.trim())
      .filter(Boolean);

    if (lines.length <= 1) {
      return `<p>${escapeHtml(lines[0])}</p>`;
    }

    return `
      <ul>
        ${lines
          .map((line) => `<li>${escapeHtml(line.replace(/^[-•*]\s*/, ""))}</li>`)
          .join("")}
      </ul>
    `;
  }

  function renderRootedOS(output) {
    const areas = Array.isArray(output.areas) ? output.areas : [];
    const plan = output.daily_plan || {};
    const verses = Array.isArray(output.reflection_verses)
      ? output.reflection_verses.slice(0, 3)
      : [];

    return `
      <article class="result-card">
        <span class="pill">Inner Work Summary</span>
        <h2>Your Inner Work reflection</h2>
        <p class="lead">${escapeHtml(output.summary || "Shared Inner Work reflection.")}</p>
      </article>

      ${
        areas.length
          ? `<div class="area-list">
              ${areas.map((area) => `
                <details class="area-card">
                  <summary>
                    <span>${escapeHtml(area.area || "Growth area")}</span>
                    <span class="badge">${escapeHtml(area.urgency || "Reflect")}</span>
                  </summary>
                  <div class="area-body">
                    <p><strong>Current state:</strong> ${escapeHtml(area.current_state || "")}</p>
                    <p><strong>Recommendation:</strong> ${escapeHtml(area.recommendation || "")}</p>
                    <p><strong>Truth anchor:</strong> ${escapeHtml(area.scripture || "")}</p>
                    <p><strong>Action step:</strong> ${escapeHtml(area.action_step || "")}</p>
                  </div>
                </details>
              `).join("")}
            </div>`
          : ""
      }

      ${
        Object.keys(plan).length
          ? `<article class="result-card">
              <span class="pill">Daily Rhythm</span>
              <div class="plan-grid">
                <div class="plan-item"><strong>Quiet reflection</strong><p>${escapeHtml(plan.prayer_minutes || "")} minutes</p></div>
                <div class="plan-item"><strong>Truth reading</strong><p>${escapeHtml(plan.bible_reading_minutes || "")} minutes</p></div>
                <div class="plan-item"><strong>Social media limit</strong><p>${escapeHtml(plan.social_media_limit_minutes || "")} minutes</p></div>
                <div class="plan-item"><strong>Reset practice</strong><p>${escapeHtml(plan.fasting_recommendation || "")}</p></div>
                <div class="plan-item"><strong>Community</strong><p>${escapeHtml(plan.community_action || "")}</p></div>
              </div>
            </article>`
          : ""
      }

      ${
        verses.length
          ? `<article class="result-card highlight">
              <span class="pill">Truth Anchors</span>
              ${verses.map((verse) => `
                <blockquote>${escapeHtml(verse.text || "")}</blockquote>
                <p>
                  <strong>${escapeHtml(verse.reference || "")}</strong>
                  ${verse.reflection_prompt ? " — " + escapeHtml(verse.reflection_prompt) : ""}
                </p>
              `).join("")}
            </article>`
          : ""
      }

      ${
        output.encouragement
          ? `<article class="result-card">
              <span class="pill">Encouragement</span>
              <p>${escapeHtml(output.encouragement)}</p>
            </article>`
          : ""
      }
    `;
  }

  function renderNewsVerse(output) {
    const verses = Array.isArray(output.verses) ? output.verses : [];
    const prayers = Array.isArray(output.prayer_points) ? output.prayer_points : [];

    return `
      <article class="result-card ${output.source_mode === "headline_only" ? "highlight" : ""}">
        <span class="pill">${output.source_mode === "headline_only" ? "Headline-Based Check" : "Signal Summary"}</span>
        <h2>${escapeHtml(output.overall_theme || "Signal reflection")}</h2>
        <p>${escapeHtml(output.article_summary || "Shared Signal reflection.")}</p>
      </article>

      ${
        output.thinking_impact
          ? `<article class="result-card">
              <span class="pill">Thinking Impact</span>
              <p>${escapeHtml(output.thinking_impact)}</p>
            </article>`
          : ""
      }

      ${
        output.truth_check || output.exegesis || output.jesus_lens
          ? `<article class="result-card">
              <span class="pill">Truth Check</span>
              ${output.truth_check ? `<p>${escapeHtml(output.truth_check)}</p>` : ""}
              ${output.exegesis ? `<p>${escapeHtml(output.exegesis)}</p>` : ""}
              ${output.jesus_lens ? `<p><strong>Grounded response:</strong> ${escapeHtml(output.jesus_lens)}</p>` : ""}
            </article>`
          : ""
      }

      ${
        prayers.length
          ? `<article class="result-card">
              <span class="pill">Reflection Steps</span>
              <ul>${prayers.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
            </article>`
          : ""
      }

      ${
        verses.length
          ? `<div class="verse-grid">
              ${verses.slice(0, 3).map((verse) => `
                <article class="verse-card">
                  <span class="pill">Truth Anchor</span>
                  <blockquote>${escapeHtml(verse.text || "")}</blockquote>
                  <p><strong>${escapeHtml(verse.reference || "")}</strong></p>
                  ${verse.application ? `<p>${escapeHtml(verse.application)}</p>` : ""}
                </article>
              `).join("")}
            </div>`
          : ""
      }
    `;
  }

  function renderTone(output) {
    return `
      <article class="result-card">
        <span class="pill">SoundSense Breakdown</span>
        <h2>${escapeHtml(output.song || "Song breakdown")}</h2>
        <p>${output.artist ? `<strong>Artist:</strong> ${escapeHtml(output.artist)}` : ""}</p>
        ${output.key ? `<p><strong>Key:</strong> ${escapeHtml(output.key)}</p>` : ""}
        ${output.bpm ? `<p><strong>BPM:</strong> ${escapeHtml(output.bpm)}</p>` : ""}
        ${
  output.metadata_confidence || output.confidence
    ? `<p><strong>Confidence:</strong> ${escapeHtml(output.metadata_confidence || output.confidence)}</p>`
    : ""
}
      </article>

      ${
        output.song_meaning
          ? `<article class="result-card">
              <span class="pill">Meaning</span>
              ${renderSharedTextBlock(output.song_meaning)}
            </article>`
          : ""
      }

      ${
        output.instrument_guidance
          ? `<article class="result-card">
              <span class="pill">Role Guidance</span>
              ${renderSharedTextBlock(output.instrument_guidance)}
            </article>`
          : ""
      }

      ${
        output.team_prep
          ? `<article class="result-card">
              <span class="pill">Team Prep</span>
              ${renderSharedTextBlock(output.team_prep)}
            </article>`
          : ""
      }

      ${
        output.faith_lens
          ? `<article class="result-card">
              <span class="pill">Reflection</span>
              ${renderSharedTextBlock(output.faith_lens)}
            </article>`
          : ""
      }
    `;
  }

  function setAppMeta(appType) {
    const normalizedAppType = normalizeAppType(appType);
    const pill = $("#appPill");
    const tryAppLink = $("#tryAppLink");

    if (normalizedAppType === "inner_work") {
      pill.textContent = "Shared Inner Work Reflection";
      tryAppLink.href = "rootedos.html";
      tryAppLink.textContent = "Try Inner Work";
    } else if (normalizedAppType === "signal") {
      pill.textContent = "Shared Signal Reflection";
      tryAppLink.href = "newsverse.html";
      tryAppLink.textContent = "Try Signal";
    } else if (normalizedAppType === "soundsense") {
      pill.textContent = "Shared SoundSense Breakdown";
      tryAppLink.href = "tone.html";
      tryAppLink.textContent = "Try SoundSense";
    } else {
      pill.textContent = "Shared Reflection";
      tryAppLink.href = "index.html";
      tryAppLink.textContent = "Visit RootedByte";
    }

    return normalizedAppType;
  }

  async function loadSharedReflection() {
    const shareId = getShareId();

    if (!shareId) {
      $("#shareTitle").textContent = "Link not found";
      $("#shareIntro").textContent = "This shared link is missing an ID.";
      $("#shareStatus").textContent = "Check the URL and try again.";
      return;
    }

    $("#shareStatus").textContent = "Loading shared reflection...";

    try {
      const response = await fetch(`/api/shared?id=${encodeURIComponent(shareId)}`, {
        method: "GET",
        cache: "no-store"
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.error || "Could not load this shared reflection.");
      }

      const item = data.item || data;
      const output = item.output || item.output_json || {};
      const appType = setAppMeta(item.appType || item.app_type || item.originalAppType || "inner_work");

      $("#shareTitle").textContent = item.title || "Shared RootedByte Reflection";

      const inputSummary = item.inputSummary || item.input_summary || "";
      const createdAt = item.createdAt || item.created_at || "";

      $("#shareIntro").textContent = inputSummary
        ? `${inputSummary}${createdAt ? " · " + formatDate(createdAt) : ""}`
        : createdAt
          ? `Shared on ${formatDate(createdAt)}`
          : "A shared RootedByte reflection.";

      $("#shareActions").hidden = false;

      if (appType === "inner_work") {
        $("#sharedResult").innerHTML = renderRootedOS(output);
      } else if (appType === "signal") {
        $("#sharedResult").innerHTML = renderNewsVerse(output);
      } else if (appType === "soundsense") {
        $("#sharedResult").innerHTML = renderTone(output);
      } else {
        $("#sharedResult").innerHTML = `
          <article class="result-card">
            <span class="pill">Shared Reflection</span>
            <p>We loaded this shared content, but do not yet know how to display it.</p>
          </article>
        `;
      }

      $("#shareStatus").textContent = "";
    } catch (error) {
      $("#shareTitle").textContent = "Unable to open this link";
      $("#shareIntro").textContent = "This shared reflection may have been removed or the link may be invalid.";
      $("#shareStatus").textContent = error.message || "Could not load this shared reflection.";
    }
  }

  loadSharedReflection();
</script>
  
</body>
</html>
