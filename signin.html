<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="Sign in or create your RootedByte account to save streaks, reflections, shared outputs, and journal entries."
  />

  <title>Sign In | RootedByte</title>

  <style>
    :root {
      --bg: #07110d;
      --bg-soft: #0c1712;
      --card: rgba(20, 30, 25, 0.92);
      --card-2: rgba(18, 27, 23, 0.96);
      --text: #f5efe4;
      --muted: #9fb2a7;
      --muted-soft: #708178;
      --line: rgba(168, 197, 160, 0.16);
      --line-strong: rgba(168, 197, 160, 0.38);
      --sage: #a8c5a0;
      --danger: #d97965;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --phone: 420px;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html {
      background: #030806;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(168, 197, 160, 0.08), transparent 24rem),
        radial-gradient(circle at bottom right, rgba(168, 197, 160, 0.05), transparent 20rem),
        linear-gradient(180deg, #07110d 0%, #06100c 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .app-shell {
      width: min(var(--phone), 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 18px 34px;
      background:
        radial-gradient(circle at 50% -10%, rgba(168, 197, 160, 0.06), transparent 18rem),
        linear-gradient(180deg, #07110d 0%, #06100c 100%);
      border-left: 1px solid rgba(168, 197, 160, 0.05);
      border-right: 1px solid rgba(168, 197, 160, 0.05);
    }

    .top-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .auth-wrap {
      min-height: calc(100vh - 90px);
      display: grid;
      align-content: start;
      justify-items: center;
      padding-top: 18px;
    }

    .hero-icon {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      margin-bottom: 18px;
      border-radius: 16px;
      background: var(--sage);
      color: #08100c;
      box-shadow: 0 18px 32px rgba(168, 197, 160, 0.14);
    }

    .hero-icon svg {
      width: 28px;
      height: 28px;
    }

    .hero-copy {
      text-align: center;
      margin-bottom: 24px;
    }

    .hero-copy h1 {
      margin: 0;
      font-size: 2.05rem;
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 800;
      color: var(--text);
    }

    .hero-copy p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .auth-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(21, 31, 26, 0.94), rgba(16, 24, 21, 0.96));
      box-shadow: var(--shadow);
      padding: 18px 16px 18px;
    }

    .google-button {
      width: 100%;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 1px solid rgba(168, 197, 160, 0.16);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .google-g {
      font-weight: 900;
      font-size: 1.1rem;
      line-height: 1;
      background: linear-gradient(90deg, #4285f4 0 25%, #ea4335 25% 50%, #fbbc05 50% 75%, #34a853 75% 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 14px;
      margin: 16px 0 16px;
      color: var(--muted-soft);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: rgba(168, 197, 160, 0.12);
    }

    .tabs {
      display: none;
    }

    .auth-form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    label {
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 800;
    }

    .forgot-link {
      color: var(--sage);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--muted);
      pointer-events: none;
    }

    input {
      width: 100%;
      min-height: 48px;
      padding: 0 14px 0 44px;
      border: 1px solid rgba(168, 197, 160, 0.22);
      border-radius: 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    #confirmPassword {
      padding-left: 14px;
    }

    input::placeholder {
      color: #8ea297;
    }

    input:focus {
      border-color: rgba(168, 197, 160, 0.72);
      box-shadow: 0 0 0 3px rgba(168, 197, 160, 0.08);
      background: rgba(255, 255, 255, 0.035);
    }

    .submit-button {
      width: 100%;
      min-height: 48px;
      margin-top: 2px;
      border: 0;
      border-radius: 14px;
      background: var(--sage);
      color: #09100d;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .submit-button:hover,
    .submit-button:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.03);
      outline: none;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .status.error {
      color: var(--danger);
    }

    .bottom-switch {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .bottom-switch button {
      border: 0;
      background: transparent;
      color: var(--sage);
      font-weight: 800;
      cursor: pointer;
      padding: 0;
    }

    .small-note {
      margin-top: 14px;
      text-align: center;
      color: var(--muted-soft);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    @media (min-width: 760px) {
      body {
        padding: 18px 0;
      }

      .app-shell {
        min-height: calc(100vh - 36px);
        border-radius: 30px;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.36);
      }

      .auth-wrap {
        min-height: calc(100vh - 126px);
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <a class="top-link" href="index.html">
      <span>←</span>
      <span>Back to RootedByte</span>
    </a>

    <main class="auth-wrap">
      <div class="hero-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M8 7V4h9a3 3 0 0 1 3 3v13a3 3 0 0 1-3 3H8v-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 12H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="m10 8-4 4 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="hero-copy">
        <h1 id="authTitle">Welcome back</h1>
        <p id="authLead">Log in to your account</p>
      </div>

      <section class="auth-card">
        <button type="button" class="google-button" id="googleSignInButton">
          <span class="google-g">G</span>
          <span>Continue with Google</span>
        </button>

        <div class="divider">or</div>

        <form class="auth-form" id="authForm">
          <div class="field">
            <label for="email">Email</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 6h16v12H4V6Z" stroke="currentColor" stroke-width="1.8" />
                <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
              </svg>
              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="you@example.com"
                required
              />
            </div>
          </div>

          <div class="field">
            <div class="field-row">
              <label for="password">Password</label>
              <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot password?</a>
            </div>

            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
              </svg>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                required
                minlength="6"
              />
            </div>
          </div>

          <div class="field" id="confirmPasswordGroup" hidden>
            <label for="confirmPassword">Confirm password</label>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              autocomplete="new-password"
              minlength="6"
              placeholder="Confirm password"
            />
          </div>

          <button class="submit-button" type="submit" id="authSubmit">Log in</button>
          <div class="status" id="authStatus" role="status" aria-live="polite"></div>
        </form>
      </section>

      <div class="bottom-switch">
        <span id="switchText">Don't have an account?</span>
        <button type="button" id="switchModeButton">Create one</button>
      </div>

      <p class="small-note">
        Your saved outputs stay private unless you choose to create a share link.
      </p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
  const $ = (selector) => document.querySelector(selector);

  const authTitle = $("#authTitle");
  const authLead = $("#authLead");
  const authForm = $("#authForm");
  const authSubmit = $("#authSubmit");
  const authStatus = $("#authStatus");
  const emailInput = $("#email");
  const passwordInput = $("#password");
  const confirmPasswordGroup = $("#confirmPasswordGroup");
  const confirmPasswordInput = $("#confirmPassword");
  const switchText = $("#switchText");
  const switchModeButton = $("#switchModeButton");
  const forgotPasswordLink = $("#forgotPasswordLink");
  const googleSignInButton = $("#googleSignInButton");

  const SIGNED_IN_FLAG = "rootedbyte_user_signed_in";

  let mode = "signin";
  let supabaseClient = null;
  let configPromise = null;

  function setStatus(message, type = "info") {
    authStatus.className = type === "error" ? "status error" : "status";
    authStatus.textContent = message || "";
  }

  function setLocalSignedInFlag(isSignedIn) {
    try {
      if (isSignedIn) {
        localStorage.setItem(SIGNED_IN_FLAG, "true");
      } else {
        localStorage.removeItem(SIGNED_IN_FLAG);
      }
    } catch {
      // Ignore localStorage issues.
    }
  }

  async function loadSupabaseConfig() {
    if (!configPromise) {
      configPromise = fetch("/api/public-config", {
        method: "GET",
        cache: "no-store"
      })
        .then(async (response) => {
          const config = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(config.error || "Could not load Supabase configuration.");
          }

          if (!config.supabaseUrl || !config.supabaseAnonKey) {
            throw new Error("Supabase configuration is incomplete.");
          }

          return config;
        });
    }

    return configPromise;
  }

  async function ensureSupabaseClient() {
    if (supabaseClient) return supabaseClient;

    if (window.rootedbyteSupabase) {
      supabaseClient = window.rootedbyteSupabase;
      return supabaseClient;
    }

    if (!window.supabase || !window.supabase.createClient) {
      throw new Error("Supabase browser client is not loaded.");
    }

    const config = await loadSupabaseConfig();

    supabaseClient = window.supabase.createClient(
      config.supabaseUrl,
      config.supabaseAnonKey
    );

    window.rootedbyteSupabase = supabaseClient;

    return supabaseClient;
  }

  function setMode(nextMode) {
    mode = nextMode;

    const signingIn = mode === "signin";

    authTitle.textContent = signingIn ? "Welcome back" : "Create account";
    authLead.textContent = signingIn
      ? "Log in to your account"
      : "Create your RootedByte account";

    authSubmit.textContent = signingIn ? "Log in" : "Create account";

    switchText.textContent = signingIn
      ? "Don't have an account?"
      : "Already have an account?";

    switchModeButton.textContent = signingIn
      ? "Create one"
      : "Sign in";

    confirmPasswordGroup.hidden = signingIn;
    confirmPasswordInput.required = !signingIn;

    forgotPasswordLink.hidden = !signingIn;

    if (signingIn) {
      confirmPasswordInput.value = "";
    }

    passwordInput.autocomplete = signingIn ? "current-password" : "new-password";
    setStatus("");
  }

  async function redirectIfAlreadySignedIn() {
    try {
      const client = await ensureSupabaseClient();
      const { data, error } = await client.auth.getSession();

      if (error) throw error;

      if (data && data.session) {
        setLocalSignedInFlag(true);
        window.location.href = "account.html";
      }
    } catch {
      setLocalSignedInFlag(false);
    }
  }

  switchModeButton.addEventListener("click", () => {
    setMode(mode === "signin" ? "signup" : "signin");
  });

  forgotPasswordLink.addEventListener("click", async (event) => {
    event.preventDefault();

    const email = emailInput.value.trim();

    if (!email) {
      setStatus("Enter your email first, then tap forgot password again.", "error");
      return;
    }

    forgotPasswordLink.style.pointerEvents = "none";
    setStatus("Sending password reset email...");

    try {
      const client = await ensureSupabaseClient();

      const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + "/signin.html"
      });

      if (error) throw error;

      setStatus("Password reset email sent. Check your inbox.");
    } catch (error) {
      setStatus(error.message || "Could not send reset email.", "error");
    } finally {
      forgotPasswordLink.style.pointerEvents = "";
    }
  });

  googleSignInButton.addEventListener("click", async () => {
    googleSignInButton.disabled = true;
    setStatus("Opening Google sign-in...");

    try {
      const client = await ensureSupabaseClient();

      const { error } = await client.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin + "/account.html"
        }
      });

      if (error) throw error;
    } catch (error) {
      googleSignInButton.disabled = false;
      setStatus(error.message || "Google sign-in is not ready.", "error");
    }
  });

  authForm.addEventListener("submit", async (event) => {
    event.preventDefault();

    const email = emailInput.value.trim();
    const password = passwordInput.value;
    const confirmPassword = confirmPasswordInput.value;

    if (!email || !password) {
      setStatus("Enter your email and password.", "error");
      return;
    }

    if (password.length < 6) {
      setStatus("Password must be at least 6 characters.", "error");
      return;
    }

    if (mode === "signup" && password !== confirmPassword) {
      setStatus("Passwords do not match.", "error");
      return;
    }

    authSubmit.disabled = true;
    setStatus(mode === "signin" ? "Signing you in..." : "Creating your account...");

    try {
      const client = await ensureSupabaseClient();

      if (mode === "signin") {
        const { error } = await client.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        setLocalSignedInFlag(true);
        setStatus("Signed in. Redirecting...");
        window.location.href = "account.html";
        return;
      }

      const { data, error } = await client.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: window.location.origin + "/account.html"
        }
      });

      if (error) throw error;

      if (data && data.session) {
        setLocalSignedInFlag(true);
        setStatus("Account created. Redirecting...");
        window.location.href = "account.html";
        return;
      }

      setStatus("Account created. Check your email to confirm your account.");
      setMode("signin");
    } catch (error) {
      setLocalSignedInFlag(false);
      setStatus(error.message || "Something went wrong.", "error");
    } finally {
      authSubmit.disabled = false;
    }
  });

  setMode("signin");
  redirectIfAlreadySignedIn();
</script>
  
</body>
</html>
