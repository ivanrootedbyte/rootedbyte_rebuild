<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="Sign in or create a RootedByte account to save reflections, shared outputs, and journal entries."
  />

  <title>Sign In | RootedByte</title>

  <style>
    :root {
      --bg: #eef3ea;
      --bg-soft: #fbf8ef;
      --card: rgba(255, 252, 244, 0.9);
      --card-strong: rgba(255, 255, 255, 0.96);
      --text: #17231b;
      --muted: #647363;
      --line: rgba(23, 35, 27, 0.12);
      --forest: #254d35;
      --forest-dark: #142a1e;
      --cream: #fbf8ef;
      --danger: #a64032;
      --shadow: 0 24px 70px rgba(34, 48, 37, 0.13);
      --radius: 30px;
      --max: 980px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 77, 53, 0.14), transparent 30rem),
        radial-gradient(circle at 86% 12%, rgba(111, 127, 79, 0.15), transparent 30rem),
        linear-gradient(180deg, #fbf8ef 0%, #eef3ea 52%, #dfe8d9 100%);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(18px);
      background: rgba(251, 248, 239, 0.84);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      width: min(var(--max), 100%);
      margin: 0 auto;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-weight: 900;
      letter-spacing: -0.04em;
      font-size: 1.15rem;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 46px;
      height: 46px;
      padding: 3px;
      border: 2px solid transparent;
      border-radius: 17px;
      background:
        linear-gradient(var(--cream), var(--cream)) padding-box,
        linear-gradient(135deg, #ff6b6b, #f7b267, #ffe66d, #4ecdc4, #5b8def, #b388ff) border-box;
      overflow: hidden;
      flex: 0 0 auto;
      box-shadow: 0 10px 24px rgba(34, 48, 37, 0.14);
    }

    .brand-mark img {
      width: 118%;
      height: 118%;
      object-fit: cover;
      object-position: center;
      display: block;
      border-radius: 14px;
    }

    .nav-scroll-wrap {
    display: flex;
    justify-content: flex-end;
    min-width: 0;
    }
 
    .nav-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-links a {
      color: var(--muted);
      padding: 9px 13px;
      border-radius: 999px;
      transition: background 180ms ease, color 180ms ease;
      font-size: 0.95rem;
      font-weight: 850;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
      background: rgba(37, 77, 53, 0.1);
    }

    .page {
      width: min(var(--max), calc(100% - 2rem));
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 4rem) 0;
      display: grid;
      place-items: center;
    }

    .auth-card {
      width: min(620px, 100%);
      border: 1px solid var(--line);
      border-radius: 36px;
      background:
        linear-gradient(135deg, rgba(255, 252, 244, 0.94), rgba(255, 255, 255, 0.86)),
        radial-gradient(circle at top right, rgba(37, 77, 53, 0.1), transparent 18rem);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      padding: clamp(1.5rem, 4vw, 3rem);
    }

    .pill {
      display: inline-flex;
      margin-bottom: 1rem;
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      color: var(--forest-dark);
      background: rgba(37, 77, 53, 0.1);
      border: 1px solid rgba(37, 77, 53, 0.16);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      line-height: 1.02;
      letter-spacing: -0.06em;
      font-weight: 950;
    }

    .lead {
      margin: 1rem 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
      margin-top: 1.5rem;
      padding: 0.35rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
    }

    .tab-button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      font-weight: 900;
      cursor: pointer;
    }

    .tab-button.active {
      color: var(--cream);
      background: linear-gradient(135deg, var(--forest-dark), var(--forest));
    }

    .auth-form {
      display: grid;
      gap: 1rem;
      margin-top: 1.25rem;
    }

    label {
      color: var(--text);
      font-weight: 900;
    }

    input {
      width: 100%;
      min-height: 54px;
      margin-top: 0.4rem;
      padding: 0 1rem;
      border: 1px solid var(--line);
      border-radius: 18px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
      outline: none;
    }

    input:focus {
      border-color: rgba(37, 77, 53, 0.38);
      box-shadow: 0 0 0 4px rgba(37, 77, 53, 0.1);
    }

    .btn {
      min-height: 52px;
      border-radius: 999px;
      padding: 0 1.25rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255, 255, 255, 0.78);
      font-weight: 900;
      cursor: pointer;
    }

    .btn.primary {
      color: var(--cream);
      background: linear-gradient(135deg, var(--forest-dark), var(--forest));
      border: 0;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-weight: 800;
    }

    .status.error {
      color: var(--danger);
    }

    .small-note {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 720px) {
  .site-header {
    padding: 0.7rem 0.85rem;
  }

  .nav {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    gap: 0.7rem;
    width: 100%;
    padding: 0;
    overflow: hidden;
  }

  .brand {
    flex: 0 0 auto;
    white-space: nowrap;
  }

  .brand-mark {
    width: 34px;
    height: 34px;
    border-radius: 12px;
  }

  .brand span:last-child {
    font-size: 0.95rem;
  }

  .nav-scroll-wrap {
    position: relative;
    flex: 1 1 auto;
    min-width: 0;
    max-width: 100%;
    overflow: hidden;
  }

  .nav-scroll-wrap::after {
    content: "›";
    position: absolute;
    right: 0.25rem;
    top: 50%;
    transform: translateY(-50%);
    width: 1.6rem;
    height: 1.6rem;
    display: grid;
    place-items: center;
    border-radius: 999px;
    color: var(--text);
    background: rgba(255, 255, 255, 0.7);
    pointer-events: none;
    font-size: 1.2rem;
    font-weight: 900;
  }

  .nav-links {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    justify-content: flex-start;
    gap: 0.35rem;
    max-width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    white-space: nowrap;
    padding: 0.28rem 2rem 0.28rem 0.28rem;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.48);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .nav-links::-webkit-scrollbar {
    display: none;
  }

  .nav-links a {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
    min-height: 36px;
    padding: 0 0.68rem;
    border-radius: 999px;
    font-size: 0.8rem;
    line-height: 1;
  }
}
    
  </style>
</head>

<body>
  <header class="site-header">
    <nav class="nav" aria-label="Primary navigation">
      <a class="brand" href="index.html" aria-label="RootedByte home">
        <span class="brand-mark">
          <img src="images/rootedbyte-icon.png" alt="" />
        </span>
        <span>RootedByte</span>
      </a>

      <div class="nav-scroll-wrap">
        <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="tone.html">Song DiveIn</a>
        <a href="newsverse.html">NewsVerse</a>
        <a href="rootedos.html">RootedOS</a>
        <a href="signin.html" class="active">Sign In</a>
      </div>
    </div>
    </nav>
  </header>

  <main class="page">
    <section class="auth-card">
      <span class="pill">RootedByte Account</span>
      <h1 id="authTitle">Sign in</h1>
      <p class="lead" id="authLead">
        Sign in to save your generated reflections, shared outputs, and future journal entries.
      </p>

      <div class="tabs" role="tablist" aria-label="Authentication mode">
        <button class="tab-button active" type="button" id="signInTab">Sign In</button>
        <button class="tab-button" type="button" id="signUpTab">Create Account</button>
      </div>

      <form class="auth-form" id="authForm">
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>

        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required minlength="6" />
        </div>

        <div id="confirmPasswordGroup" hidden>
  <label for="confirmPassword">Confirm password</label>
  <input
    id="confirmPassword"
    name="confirmPassword"
    type="password"
    autocomplete="new-password"
    minlength="6"
  />
</div>
        
        <button class="btn primary" type="submit" id="authSubmit">Sign In</button>
        <div class="status" id="authStatus" role="status" aria-live="polite"></div>
      </form>

      <p class="small-note">
        Saved outputs are private unless you choose to share them publicly.
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const $ = (selector) => document.querySelector(selector);

    const authTitle = $('#authTitle');
    const authLead = $('#authLead');
    const signInTab = $('#signInTab');
    const signUpTab = $('#signUpTab');
    const authForm = $('#authForm');
    const authSubmit = $('#authSubmit');
    const authStatus = $('#authStatus');
    const emailInput = $('#email');
    const passwordInput = $('#password');
    const confirmPasswordGroup = $('#confirmPasswordGroup');
    const confirmPasswordInput = $('#confirmPassword');

    let mode = 'signin';
    let supabaseClient = null;

    function setStatus(message, type = 'info') {
      authStatus.className = type === 'error' ? 'status error' : 'status';
      authStatus.textContent = message;
    }

    function setMode(nextMode) {
      mode = nextMode;

      const isSignUp = mode === 'signup';

      signInTab.classList.toggle('active', !isSignUp);
      signUpTab.classList.toggle('active', isSignUp);

      authTitle.textContent = isSignUp ? 'Create account' : 'Sign in';
      authLead.textContent = isSignUp
        ? 'Create a free RootedByte account to save outputs and journal privately.'
        : 'Sign in to save your generated reflections, shared outputs, and future journal entries.';

      authSubmit.textContent = isSignUp ? 'Create Account' : 'Sign In';
      passwordInput.autocomplete = isSignUp ? 'new-password' : 'current-password';

if (confirmPasswordGroup && confirmPasswordInput) {
  confirmPasswordGroup.hidden = !isSignUp;
  confirmPasswordInput.required = isSignUp;

  if (!isSignUp) {
    confirmPasswordInput.value = '';
  }
}

setStatus('');
    }

    async function loadSupabaseClient() {
      const response = await fetch('/api/public-config');
      const config = await response.json();

      if (!response.ok) {
        throw new Error(config.error || 'Could not load Supabase config.');
      }

      supabaseClient = window.supabase.createClient(
        config.supabaseUrl,
        config.supabaseAnonKey
      );

      const { data } = await supabaseClient.auth.getSession();

      if (data.session) {
        window.location.href = 'account.html';
      }
    }

    signInTab.addEventListener('click', () => setMode('signin'));
    signUpTab.addEventListener('click', () => setMode('signup'));

    authForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!supabaseClient) {
        setStatus('Account system is still loading. Please try again.', 'error');
        return;
      }

      const email = emailInput.value.trim();
const password = passwordInput.value;
const confirmPassword = confirmPasswordInput?.value || '';

if (!email || !password) {
  setStatus('Enter your email and password.', 'error');
  return;
}

if (mode === 'signup' && password !== confirmPassword) {
  setStatus('Passwords do not match.', 'error');
  return;
}

      authSubmit.disabled = true;
      setStatus(mode === 'signup' ? 'Creating your account...' : 'Signing you in...');

      try {
        if (mode === 'signup') {
          const { data, error } = await supabaseClient.auth.signUp({
            email,
            password,
            options: {
              emailRedirectTo: `${window.location.origin}/account.html`
            }
          });

          if (error) throw error;

          if (data.session) {
            window.location.href = 'account.html';
            return;
          }

          setStatus('Account created. Check your email to confirm your sign in.');
        } else {
          const { error } = await supabaseClient.auth.signInWithPassword({
            email,
            password
          });

          if (error) throw error;

          window.location.href = 'account.html';
        }
      } catch (error) {
        setStatus(error.message || 'Something went wrong.', 'error');
      } finally {
        authSubmit.disabled = false;
      }
    });

    loadSupabaseClient().catch((error) => {
      setStatus(error.message || 'Could not load account system.', 'error');
    });
  </script>
</body>
</html>
