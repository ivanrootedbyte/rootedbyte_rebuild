<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="Sign in or create your RootedByte account to save streaks, reflections, shared outputs, and journal entries."
  />

  <title>Sign In | RootedByte</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #111714;
      --bg-deep: #0b100d;
      --panel: rgba(24, 32, 27, 0.92);
      --panel-strong: rgba(27, 37, 31, 0.98);
      --cream: #f5efe4;
      --muted: #9fb2a7;
      --muted-soft: #72857b;
      --line: rgba(168, 197, 160, 0.16);
      --sage: #a8c5a0;
      --amber: #e8c97a;
      --lavender: #b8a8d8;
      --danger: #d97965;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --phone: 420px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg-deep);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--cream);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(168, 197, 160, 0.08), transparent 18rem),
        radial-gradient(circle at 88% 20%, rgba(232, 201, 122, 0.06), transparent 18rem),
        radial-gradient(circle at 50% 100%, rgba(184, 168, 216, 0.06), transparent 20rem),
        var(--bg-deep);
      line-height: 1.55;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    .app-shell {
      width: min(var(--phone), 100%);
      min-height: 100vh;
      margin: 0 auto;
      background:
        radial-gradient(circle at 50% -10%, rgba(168, 197, 160, 0.08), transparent 18rem),
        linear-gradient(180deg, #111714 0%, #0f1512 100%);
      border-left: 1px solid rgba(168, 197, 160, 0.08);
      border-right: 1px solid rgba(168, 197, 160, 0.08);
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(17, 23, 20, 0.9);
      border-bottom: 1px solid rgba(168, 197, 160, 0.1);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 12px;
      background:
        linear-gradient(var(--bg), var(--bg)) padding-box,
        linear-gradient(135deg, var(--sage), var(--amber), var(--lavender)) border-box;
      border: 1px solid transparent;
      flex: 0 0 auto;
    }

    .brand-mark img {
      width: 118%;
      height: 118%;
      object-fit: cover;
      object-position: center;
      border-radius: 10px;
    }

    .brand-name {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--cream);
      white-space: nowrap;
    }

    .header-link {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .page {
      min-height: calc(100vh - 52px);
      display: grid;
      align-items: center;
      padding: 24px 14px 32px;
    }

    .auth-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(25, 35, 29, 0.94), rgba(20, 28, 24, 0.92));
      box-shadow: var(--shadow);
      padding: 22px 18px 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      color: var(--sage);
      background: rgba(168, 197, 160, 0.08);
      border: 1px solid rgba(168, 197, 160, 0.12);
      font-size: 0.73rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 {
      margin: 16px 0 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: 2.25rem;
      line-height: 0.98;
      letter-spacing: -0.06em;
      color: var(--cream);
    }

    .lead {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.65;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 18px;
      padding: 4px;
      border: 1px solid rgba(168, 197, 160, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
    }

    .tab-button {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      background: transparent;
      font-weight: 800;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease;
    }

    .tab-button.active {
      color: #111714;
      background: var(--sage);
    }

    .auth-form {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--cream);
      font-size: 0.91rem;
      font-weight: 800;
    }

    input {
      width: 100%;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid rgba(168, 197, 160, 0.2);
      border-radius: 12px;
      color: var(--cream);
      background: rgba(255, 255, 255, 0.04);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    input::placeholder {
      color: #8ea297;
    }

    input:focus {
      border-color: rgba(168, 197, 160, 0.72);
      box-shadow: 0 0 0 3px rgba(168, 197, 160, 0.08);
      background: rgba(255, 255, 255, 0.055);
    }

    .btn {
      min-height: 48px;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn.primary {
      border: 0;
      color: #111714;
      background: var(--sage);
      transition: transform 180ms ease, filter 180ms ease;
    }

    .btn.primary:hover,
    .btn.primary:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.04);
      outline: none;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .status.error {
      color: var(--danger);
    }

    .small-note {
      margin-top: 14px;
      color: var(--muted-soft);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .auth-footer {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(168, 197, 160, 0.1);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted-soft);
      font-size: 0.78rem;
    }

    .auth-footer a {
      color: var(--muted);
    }

    @media (min-width: 760px) {
      body {
        padding: 18px 0;
      }

      .app-shell {
        min-height: calc(100vh - 36px);
        border-radius: 30px;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.36);
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="index.html" aria-label="RootedByte home">
        <span class="brand-mark">
          <img src="images/rootedbyte-icon.png" alt="RootedByte logo" />
        </span>
        <span class="brand-name">RootedByte</span>
      </a>

      <a class="header-link" href="index.html">Home</a>
    </header>

    <main class="page">
      <section class="auth-card">
        <span class="pill">RootedByte Account</span>
        <h1 id="authTitle">Sign in</h1>
        <p class="lead" id="authLead">
          Sign in to save your streaks, reflections, shared outputs, and journal entries.
        </p>

        <div class="tabs" role="tablist" aria-label="Authentication mode">
          <button class="tab-button active" type="button" id="signInTab">Sign In</button>
          <button class="tab-button" type="button" id="signUpTab">Create Account</button>
        </div>

        <form class="auth-form" id="authForm">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              minlength="6"
            />
          </div>

          <div class="field" id="confirmPasswordGroup" hidden>
            <label for="confirmPassword">Confirm password</label>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              autocomplete="new-password"
              minlength="6"
            />
          </div>

          <button class="btn primary" type="submit" id="authSubmit">Sign In</button>
          <div class="status" id="authStatus" role="status" aria-live="polite"></div>
        </form>

        <p class="small-note">
          Your saved outputs stay private unless you choose to create a share link.
        </p>

        <div class="auth-footer">
          <a href="privacy.html">Privacy</a>
          <a href="mailto:rootedbyte@outlook.com">Contact</a>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const $ = (selector) => document.querySelector(selector);

    const authTitle = $("#authTitle");
    const authLead = $("#authLead");
    const signInTab = $("#signInTab");
    const signUpTab = $("#signUpTab");
    const authForm = $("#authForm");
    const authSubmit = $("#authSubmit");
    const authStatus = $("#authStatus");
    const emailInput = $("#email");
    const passwordInput = $("#password");
    const confirmPasswordGroup = $("#confirmPasswordGroup");
    const confirmPasswordInput = $("#confirmPassword");

    let mode = "signin";
    let supabaseClient = null;

    function setStatus(message, type = "info") {
      authStatus.className = type === "error" ? "status error" : "status";
      authStatus.textContent = message || "";
    }

    function setMode(nextMode) {
  mode = nextMode;

  const signingIn = mode === "signin";

  signInTab.classList.toggle("active", signingIn);
  signUpTab.classList.toggle("active", !signingIn);

  authTitle.textContent = signingIn ? "Sign in" : "Create account";
  authLead.textContent = signingIn
    ? "Sign in to save your streaks, reflections, shared outputs, and journal entries."
    : "Create your RootedByte account to keep your progress connected to you.";

  authSubmit.textContent = signingIn ? "Sign In" : "Create Account";

  confirmPasswordGroup.hidden = signingIn;
  confirmPasswordInput.required = !signingIn;

  if (signingIn) {
    confirmPasswordInput.value = "";
  }

  passwordInput.autocomplete = signingIn ? "current-password" : "new-password";
  setStatus("");
}

    signInTab.addEventListener("click", () => setMode("signin"));
    signUpTab.addEventListener("click", () => setMode("signup"));

    function getSupabaseConfig() {
      const SUPABASE_URL =
        window.SUPABASE_URL ||
        document.documentElement.dataset.supabaseUrl ||
        "";
      const SUPABASE_ANON_KEY =
        window.SUPABASE_ANON_KEY ||
        document.documentElement.dataset.supabaseAnonKey ||
        "";

      return { SUPABASE_URL, SUPABASE_ANON_KEY };
    }

    function ensureSupabaseClient() {
      if (supabaseClient) return supabaseClient;

      const { SUPABASE_URL, SUPABASE_ANON_KEY } = getSupabaseConfig();

      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        throw new Error("Supabase keys are not connected yet.");
      }

      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      return supabaseClient;
    }

    authForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!email || !password) {
        setStatus("Enter your email and password.", "error");
        return;
      }

      if (mode === "signup" && password !== confirmPassword) {
        setStatus("Passwords do not match.", "error");
        return;
      }

      authSubmit.disabled = true;
      setStatus(mode === "signin" ? "Signing you in..." : "Creating your account...");

      try {
        const client = ensureSupabaseClient();

        if (mode === "signin") {
          const { error } = await client.auth.signInWithPassword({
            email,
            password
          });

          if (error) throw error;

          setStatus("Signed in. Redirecting...");
          window.location.href = "account.html";
          return;
        }

        const { error } = await client.auth.signUp({
          email,
          password
        });

        if (error) throw error;

        setStatus("Account created. Check your email if confirmation is enabled.");
      } catch (error) {
        setStatus(error.message || "Something went wrong.", "error");
      } finally {
        authSubmit.disabled = false;
      }
    });

    setMode("signin");
  </script>
</body>
</html>
