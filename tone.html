<script>
const $ = (selector) => document.querySelector(selector);

const year = $('#year');
if (year) year.textContent = new Date().getFullYear();

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function setStatus(element, message, type = 'info', loading = false) {
  if (!element) return;

  element.className = type === 'error' ? 'status error' : 'status';
  element.innerHTML = loading
    ? `<span class="spinner" aria-hidden="true"></span><span>${escapeHtml(message)}</span>`
    : escapeHtml(message);
}

async function postJson(url, body) {
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  const data = await response.json().catch(() => ({}));

  if (!response.ok) {
    throw new Error(data.error || 'Something went wrong. Please try again.');
  }

  return data;
}

function renderKnob(label, value, max = 10) {
  const number = Math.max(0, Math.min(max, Number(value) || 0));
  const percent = max === 800 ? (number / 800) * 100 : (number / 10) * 100;
  const display = max === 800 ? `${Math.round(number)}ms` : number.toFixed(1).replace('.0', '');

  return `
    <div class="knob">
      <div class="dial" style="--value:${percent}">
        <strong>${display}</strong>
      </div>
      <small>${escapeHtml(label)}</small>
    </div>
  `;
}

/* -----------------------------
   Chord transpose helpers
------------------------------ */

const CHROMATIC_KEYS = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

const FLAT_TO_SHARP = {
  Db: 'C#',
  Eb: 'D#',
  Gb: 'F#',
  Ab: 'G#',
  Bb: 'A#'
};

let currentChordData = null;

function normalizeKeyName(key) {
  if (!key) return '';

  const cleaned = String(key)
    .trim()
    .replace('♭', 'b')
    .replace('♯', '#');

  const root = cleaned.match(/[A-G](#|b)?/i)?.[0];

  if (!root) return '';

  const formatted = root.charAt(0).toUpperCase() + root.slice(1);
  return FLAT_TO_SHARP[formatted] || formatted;
}

function getKeyIndex(key) {
  const normalized = normalizeKeyName(key);
  return CHROMATIC_KEYS.indexOf(normalized);
}

function transposeChord(chord, semitones) {
  return String(chord || '').replace(/[A-G](#|b)?/g, (match) => {
    const normalized = FLAT_TO_SHARP[match] || match;
    const index = CHROMATIC_KEYS.indexOf(normalized);

    if (index === -1) return match;

    return CHROMATIC_KEYS[(index + semitones + 120) % 12];
  });
}

function transposeChordLine(line, semitones) {
  return String(line || '')
    .split(/\s+/)
    .map((chord) => transposeChord(chord, semitones))
    .join(' ');
}

function calculateCapo(originalKey, targetKey) {
  const originalIndex = getKeyIndex(originalKey);
  const targetIndex = getKeyIndex(targetKey);

  if (originalIndex === -1 || targetIndex === -1) {
    return 'Capo suggestion unavailable.';
  }

  const upDistance = (targetIndex - originalIndex + 12) % 12;
  const downDistance = (originalIndex - targetIndex + 12) % 12;

  if (upDistance === 0) {
    return 'No capo needed for the original key.';
  }

  if (downDistance > 0 && downDistance <= 7) {
    return `Optional capo idea: play in ${targetKey} shapes with capo ${downDistance}.`;
  }

  return `Transpose up ${upDistance} semitone${upDistance === 1 ? '' : 's'} from the original key.`;
}

function renderChordSections(chordData, selectedKey = '') {
  if (!chordData || !Array.isArray(chordData.sections) || !chordData.sections.length) {
    return `
      <div class="notice-box">
        Chords are not available for this song yet. Try the external chord source link if one was found.
      </div>
    `;
  }

  const originalKey = normalizeKeyName(chordData.original_key || chordData.key || '');
  const targetKey = selectedKey || originalKey || 'C';

  const originalIndex = getKeyIndex(originalKey);
  const targetIndex = getKeyIndex(targetKey);

  const semitones = originalIndex !== -1 && targetIndex !== -1
    ? (targetIndex - originalIndex + 12) % 12
    : 0;

  const sectionsHtml = chordData.sections.map((section) => {
    const lines = Array.isArray(section.chords) ? section.chords : [];
    const transposedLines = lines.map((line) => transposeChordLine(line, semitones));

    return `
      <div class="chord-section">
        <strong>${escapeHtml(section.name || 'Section')} Chords</strong>
        <div class="chord-line">${escapeHtml(transposedLines.join('\n'))}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="chord-toolbar">
      <div class="field">
        <label for="transposeKey">Transpose to Key</label>
        <select id="transposeKey">
          ${CHROMATIC_KEYS.map((key) => `
            <option value="${key}" ${key === targetKey ? 'selected' : ''}>${key}</option>
          `).join('')}
        </select>
      </div>

      <div class="notice-box">
        ${escapeHtml(calculateCapo(originalKey, targetKey))}
      </div>
    </div>

    <div class="chord-section-grid">
      ${sectionsHtml}
    </div>
  `;
}

function bindTransposeControl() {
  const transposeSelect = document.getElementById('transposeKey');
  const chordContainer = document.getElementById('interactiveChords');

  if (!transposeSelect || !chordContainer || !currentChordData) return;

  transposeSelect.addEventListener('change', () => {
    chordContainer.innerHTML = renderChordSections(currentChordData, transposeSelect.value);
    bindTransposeControl();
  });
}

/* -----------------------------
   Resource render helpers
------------------------------ */

function renderResourceLinks(resources = []) {
  const safeResources = Array.isArray(resources)
    ? resources.filter((item) => item && item.url)
    : [];

  if (!safeResources.length) {
    return '<p class="hint">No external source link was found for this item.</p>';
  }

  return `
    <div class="resource-links">
      ${safeResources.map((item) => `
        <a href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">
          ${escapeHtml(item.label || item.source || item.url)}
        </a>
      `).join('')}
    </div>
  `;
}

function renderTutorialLinks(tutorials = []) {
  const safeTutorials = Array.isArray(tutorials)
    ? tutorials.filter((item) => item && item.url)
    : [];

  if (!safeTutorials.length) {
    return '<p class="hint">No tutorial links were found. Try searching YouTube with the song title and artist.</p>';
  }

  return `
    <div class="tutorial-list">
      ${safeTutorials.map((item) => `
        <a class="tutorial-link" href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">
          <strong>${escapeHtml(item.title || 'Guitar tutorial')}</strong>
          <span>${escapeHtml(item.source || 'External tutorial source')}</span>
        </a>
      `).join('')}
    </div>
  `;
}

function buildPresetLinks(data, gear, originalInput = '') {
  const song = data.song || '';
  const artist = data.artist || '';

  const terms = `
    ${originalInput && !/^https?:\/\//i.test(originalInput) ? originalInput : ''}
    ${song}
    ${artist}
    ${gear}
  `.replace(/\s+/g, ' ').trim();

  const searches = [
    {
      label: 'Official or vendor preset search',
      note: 'Searches public results for presets related to this song and gear.',
      query: `${terms} official guitar preset patch download`
    },
    {
      label: 'Community preset search',
      note: 'Searches public results for shared patches and community tone ideas.',
      query: `${terms} community guitar preset patch download`
    },
    {
      label: 'Worship tone search',
      note: 'Searches worship-focused tone sources and preset vendors.',
      query: `${terms} worship guitar tone preset`
    }
  ];

  return searches.map((item) => {
    const url = `https://www.google.com/search?q=${encodeURIComponent(item.query)}`;

    return `
      <a class="preset-link" href="${url}" target="_blank" rel="noreferrer">
        <strong>${escapeHtml(item.label)}</strong>
        <span>${escapeHtml(item.note)}</span>
      </a>
    `;
  }).join('');
}

function renderSongDeepDive(data) {
  const chordData = data.chord_data || null;
  currentChordData = chordData;

  const lyricsResources = Array.isArray(data.lyrics_links) ? data.lyrics_links : [];
  const chordResources = Array.isArray(data.chord_links) ? data.chord_links : [];
  const tutorials = Array.isArray(data.tutorial_links) ? data.tutorial_links : [];

  const songMeaning =
    data.song_meaning ||
    data.meaning_summary ||
    'Song meaning is not available yet.';

  return `
    <div class="song-deep-dive-grid">
      <div class="deep-dive-card">
        <span class="tag">Song Meaning</span>
        <h3>What the song is about</h3>
        <p>${escapeHtml(songMeaning)}</p>
        <p class="hint">
          This is AI-generated from public context when available. If public context is limited,
          it may be an interpretation and should be verified with official artist notes when possible.
        </p>
      </div>

      <div class="deep-dive-card">
        <span class="tag">Lyrics Source</span>
        <h3>Lyrics link</h3>
        <p>
          For copyright reasons, full lyrics are not embedded here. Use the external source link when available.
        </p>
        ${renderResourceLinks(lyricsResources)}
      </div>

      <div class="deep-dive-card">
        <span class="tag">Interactive Chords</span>
        <h3>Verse, chorus, and bridge chords</h3>
        <p>
          These chords are a practice-friendly starting point. Always verify against the linked chord source when available.
        </p>
        ${renderResourceLinks(chordResources)}
        <div id="interactiveChords">
          ${renderChordSections(chordData)}
        </div>
      </div>

      <div class="deep-dive-card">
        <span class="tag">Guitar Tutorials</span>
        <h3>Learn to play it</h3>
        <p>
          Open external tutorials for walkthroughs, rhythm ideas, or worship guitar approaches.
        </p>
        ${renderTutorialLinks(tutorials)}
      </div>
    </div>
  `;
}

/* -----------------------------
   Main Song DiveIn submit
------------------------------ */

$('#toneForm').addEventListener('submit', async (event) => {
  event.preventDefault();

  const songInput = $('#songInput').value.trim();
  const gear = $('#gearSelect').value;
  const status = $('#toneStatus');
  const result = $('#toneResult');

  result.innerHTML = '';

  if (!songInput) {
    setStatus(status, 'Please enter a song name or YouTube link.', 'error');
    return;
  }

  if (/open\.spotify\.com\/track\//i.test(songInput)) {
    setStatus(status, 'Spotify links are not supported. Please type the song name and artist, or paste a YouTube link.', 'error');
    return;
  }

  setStatus(status, 'Researching the song and building your Song DiveIn results...', 'info', true);

  try {
    const data = await postJson('/api/tone', { songInput, gear });

    result.innerHTML = `
      <div class="tone-labels">
        <div class="tone-label">
          <span>Song</span>
          <strong>${escapeHtml(data.song)}${data.artist ? ' - ' + escapeHtml(data.artist) : ''}</strong>
        </div>

        <div class="tone-label">
          <span>Gear</span>
          <strong>${escapeHtml(gear)}</strong>
        </div>

        <div class="tone-label">
          <span>BPM</span>
          <strong>${data.bpm ? escapeHtml(data.bpm) : 'Unknown'}</strong>
        </div>

        <div class="tone-label">
          <span>Key</span>
          <strong>${escapeHtml(data.key || 'Unknown')}</strong>
        </div>

        <div class="tone-label">
          <span>Confidence</span>
          <strong>${escapeHtml(data.metadata_confidence || 'low')}</strong>
        </div>

        <div class="tone-label">
          <span>Amp model</span>
          <strong>${escapeHtml(data.amp_model || 'Not available')}</strong>
        </div>

        <div class="tone-label">
          <span>Cab</span>
          <strong>${escapeHtml(data.cab || 'Not available')}</strong>
        </div>
      </div>

      ${renderSongDeepDive(data)}

      <div class="result-card">
        <span class="tag">Tone Settings</span>
        <h3>Starting-point guitar tone</h3>

        <div class="knob-grid">
          ${renderKnob('Gain', data.gain)}
          ${renderKnob('Bass', data.bass)}
          ${renderKnob('Mid', data.mid)}
          ${renderKnob('Treble', data.treble)}
          ${renderKnob('Presence', data.presence)}
          ${renderKnob('Reverb mix', data.reverb_mix)}
          ${renderKnob('Delay mix', data.delay_mix)}
          ${renderKnob('Delay time', data.delay_time_ms, 800)}
        </div>

        <p>${escapeHtml(data.notes || '')}</p>
      </div>

      <div class="result-card">
        <span class="tag">Preset Finder</span>
        <h3>Find downloadable presets</h3>
        <p>
          These public searches can help you find official, community, or worship-focused preset sources.
          Some presets may be paid, account-required, or unavailable.
        </p>

        <div class="preset-grid">
          ${buildPresetLinks(data, gear, songInput)}
        </div>
      </div>
    `;

    bindTransposeControl();
    setStatus(status, 'Song DiveIn results ready.');
  } catch (error) {
    setStatus(status, error.message, 'error');
  }
});
</script>
